<!--  
    [취소선 태그]  
    (1) 태그 형식
        - <s>취소선</s>
        - <del>취소선</del>
    (2) 의미
        - s 태그는 stricke(취소선)의 의미로, 시각적인 취소선을 표시합니다.
        - del 태그는 delete 줄임말로, 삭제되었거나 더 이상 유효하지 않은 내용을 의미합니다.
    (3) 기능 및 특징
        - 텍스트에 취소선을 그어 더 이상 사용되지 않음을 표시합니다.
        - 가격 변경, 내용 수정 전후 비교 등에 사용됩니다.
-->

<h3>s태그 사용 예시 (가격 변동)</h3>
원가: <s>8000</s> <br>
할인가: 7800

<h3>del 태그 사용 예시 (규칙 삭제)</h3>
<del>수업 중 휴대폰 사용 가능</del> <br>
※ 해당 규칙은 삭제되었습니다.
