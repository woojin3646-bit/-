<!--  
    [글자 크기 보조 태그]  
    (1) 태그 형식
        - <big>큰 글자</big>
        - <small>작은 글자</small>
    (2) 의미
        - big 태그는 현재 글자 크기를 기준으로 상대적으로 크게 표시합니다.
        - small 태그는 현재 글자 크기를 기준으로 상대적으로 작게 표시합니다.
    (3) 기준 글자란?
        - 기준 글자란 지금 화면에 기본으로 표시되고 있는 글자 크기를 의미합니다.
        - 보통 브라우저에서 기본 글자 크기는 16px 입니다.
        - 하지만 기준 글자는 항상 16px로 고정되지 않으며,
          적용된 태그에 따라 기준이 달라질 수 있습니다.
    (4) 기능 및 특징
        - 글자의 중요도나 보조 설명을 표현할 때 사용합니다.
        - 글자 크기를 정확한 값으로 조절할 수는 없습니다.
        - 정확한 크기 조절이 필요할 경우 CSS를 사용합니다.
-->

<p>기준 글자</p>
<p><big>기준 글자보다 큰 글자</big></p>
<p><small>기준 글자보다 작은 글자</small></p>

<hr>

<h3>제목</h3>
<h3><small>제목보다 작은 글자</small></h3>
