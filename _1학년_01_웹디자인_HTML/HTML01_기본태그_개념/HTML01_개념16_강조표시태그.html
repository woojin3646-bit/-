        - 문맥상 중요한 키워드나 검색 결과 강조에 사용됩니다.
        - 글자의 의미를 강조하는 태그이며, 단순한 디자인 목적과는 다릅니다.
-->

<p>
검색 결과:
HTML 문서에서 <mark>mark 태그</mark>는
