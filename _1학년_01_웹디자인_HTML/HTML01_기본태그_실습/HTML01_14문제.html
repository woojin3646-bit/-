<!--
    [문제]
    취소선 <s> 태그와 <del> 태그를 이용해 결과 화면과 같은 형식으로 출력하세요.
    (가격 변경 예시는 <s>, 규칙/문구 삭제 예시는 <del>을 사용하세요.)

    [보기]
    가격 변경
    원가 8000
    할인가 7800

    공지 수정
    수업 중 휴대폰 사용 가능 (삭제됨)
    현재 규칙: 수업 중 휴대폰 사용 금지

    [결과 화면]
    HTML01_14문제화면.png
--> <h3>[보기]</h3>

<div>
  <h4>가격 변경</h4>
  <p>원가 <del>8000</del></p>
  <p>할인가 7800</p>
</div>

<div>
  <h4>공지 수정</h4>
  <p><del>수업 중 휴대폰 사용 가능</del> (삭제됨)</p>
  <p>현재 규칙: 수업 중 휴대폰 사용 금지</p>
</div>
