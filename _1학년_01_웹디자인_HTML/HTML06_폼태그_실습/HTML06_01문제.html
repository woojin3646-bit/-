    <!--
        [문제]
        HTML06_01문제화면.png 이미지와 동일한 결과 화면이 나오도록 
        HTML의 다양한 데이터 입력 태그를 작성하세요.
        
        1. 텍스트 입력 필드를 사용하여 "아이디"를 입력받는 필드를 만드세요.
        2. 비밀번호 입력 필드를 사용하여 "비밀번호"를 입력받는 필드를 만드세요.
        3. 이메일 입력 필드를 사용하여 "이메일"을 입력받는 필드를 만드세요.
        4. 라디오 버튼을 사용하여 "성별"을 선택할 수 있는 필드를 만드세요.
        5. 체크박스를 사용하여 "약관 동의"를 받을 수 있는 필드를 만드세요.
        6. 파일 선택 필드를 사용하여 파일을 선택할 수 있는 필드를 만드세요.
        7. 날짜 입력 필드를 사용하여 "날짜"를 선택할 수 있는 필드를 만드세요.
        8. 날짜와 시간 입력 필드를 사용하여 "날짜와 시간"을 선택할 수 있는 필드를 만드세요.
        9. 색상 선택 필드를 사용하여 "색상"을 선택할 수 있는 필드를 만드세요.
    -->

    아이디를 입력하세요. <input type="text">

    <br>
    날짜와 시간을 선택하세요.<input type="datetime-local">
    <br>
    색을 선택하세요.<input type="color">
