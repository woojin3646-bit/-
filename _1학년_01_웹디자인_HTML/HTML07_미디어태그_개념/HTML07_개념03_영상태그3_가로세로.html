<!--
    [영상 태그3 가로세로]
    (1) 태그 형식
        - <video></video>
    (2) 의미
        - 웹 페이지에서 동영상 콘텐츠를 재생하기 위한 태그
    (3) 기능 및 특징
        - 웹 페이지에서 영상을 재생할 수 있는 플레이어를 구현합니다.
    (4) src 속성
        - 재생할 비디오 파일의 경로를 지정합니다.
        - 예: <video src="video.mp4"></video>
    (5) controls 속성
        - 재생, 일시 정지, 볼륨 조절 등 기본 컨트롤을 표시합니다.
    (6) muted 속성
        - 영상의 소리를 기본적으로 음소거 상태로 설정합니다.
    (7) width, height 속성
        - video 요소의 가로(width)와 세로(height) 크기를 지정합니다.
        - 한 쪽만 지정할 경우 원본 영상의 비율을 유지하여 자동 조절됩니다.
-->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <video muted controls src="resources/Clouds.mp4" width="300px" height="200px"></video>
   
</body>
</html>
