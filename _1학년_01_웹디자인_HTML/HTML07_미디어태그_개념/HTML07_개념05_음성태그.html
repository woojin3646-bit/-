<!--
    [음성 태그]
    (1) 태그 형식
        - <audio></audio>
    (2) 의미
        - 웹 페이지에서 음성(오디오) 콘텐츠를 재생하기 위한 태그
    (3) 기능 및 특징
        - 음악, 효과음, 음성 안내 등 다양한 오디오 콘텐츠에 사용됩니다.
    (4) src 속성
        - 재생할 오디오 파일의 경로를 지정합니다.
        - 예: <audio src="audio.mp3"></audio>
    (5) controls 속성
        - 재생, 일시 정지, 음량 조절 등 기본 컨트롤을 표시합니다.
    (6) muted 속성
        - 오디오를 기본 음소거 상태로 재생합니다.
-->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <audio controls src="resources/After_You.mp3"></audio>

    <br>

    <audio controls muted src="resources/After_You.mp3"></audio>

</body>
</html>
