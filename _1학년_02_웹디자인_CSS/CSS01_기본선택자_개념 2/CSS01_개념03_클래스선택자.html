<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>
        .a{
            color: blue;
        }
        .b{
            color: cadetblue;
        }
        .c{
            color: burlywood;
        }
    </style>
</head>
<body>
    <!-- 같은 h1 태그이지만,// 보통 타입으로 함
    
        class 값에 따라 서로 다른 스타일이 적용됨 -->
   <h1 class="a">123</h1>
   <h1 class="b">123</h1>
   <h1 class="c">123</h1>
   <h1 class="d">123</h1>
</body>
</html>
