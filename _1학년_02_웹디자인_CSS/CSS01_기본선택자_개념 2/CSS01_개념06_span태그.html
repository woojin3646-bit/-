<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [span 태그]
            1. span 태그는 특별한 의미를 가지지 않는 태그입니다.
            2. 글자나 문장 일부를 묶기 위해 사용합니다.
            3. 특정 부분에만 스타일을 적용할 때 사용합니다.
        */
        
        span {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <p>
        이 문장 중 <span>이 부분만</span> 색상이 변경됩니다.
    </p>
</body>
</html>
