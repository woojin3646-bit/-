<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [block 요소]
            1. block 요소는 한 줄 전체를 차지합니다.
            2. 자동으로 줄바꿈이 발생합니다.
            3. 대표적인 block 요소 : div, h1, p
        */
        
        div {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div>첫 번째 block 요소</div>
    <div>두 번째 block 요소</div>    
</body>
</html>
