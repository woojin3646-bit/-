<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [CSS 기본 문법]
            1. CSS는 <style> 태그 안에 작성하며,
               HTML 요소에 디자인(스타일)을 적용하기 위해 사용합니다.
            2. CSS 문법

                선택자 {
                    속성: 값;
                }

                - 선택자 : 스타일을 적용할 HTML 요소
                - 속성   : 적용할 스타일의 종류
                - 값     : 속성에 설정할 구체적인 내용
            3. 하나의 선택자에 여러 개의 속성을 적용할 수 있으며,
               각 속성은 세미콜론(;)으로 구분합니다.
        */      
          
        h1 {
            background-color: yellow;       /* 배경색을 노란색으로 설정 */
            color: red;                     /* 글자색을 빨간색으로 설정 */
        }
    </style>
</head>
<body>
    <h1>배경색은 yellow, 글자색은 red</h1>
</body>
</html>
