<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [태그 선택자]
            1. 태그 선택자는 HTML 태그 이름을 그대로 사용하여
               해당 태그에 스타일을 적용하는 선택자입니다.
            2. 같은 태그 이름을 가진 요소가 여러 개 있을 경우,
               문서에 존재하는 모든 태그에 동일한 스타일이 적용됩니다.
        */
        
        h1 {
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <h1>첫 번째 h1 태그</h1>
    <h1>두 번째 h1 태그</h1>
    <h1>세 번째 h1 태그</h1>
</body>
</html>
