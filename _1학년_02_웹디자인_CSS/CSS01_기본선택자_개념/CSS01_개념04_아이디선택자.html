<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [아이디 선택자]
            1. id 선택자는 HTML 요소를 고유하게 식별하기 위해 사용하며,
               하나의 요소에만 스타일을 적용할 때 사용합니다.
            2. id 선택자는 이름 앞에 샵(#)을 붙여서 작성합니다.
            3. id 값은 문서 내에서 중복 사용할 수 없으며,
               하나의 요소에만 사용해야 합니다.
        */
        
        #title {
            background-color: black;    /* id가 title인 요소의 배경색 */
            color: white;               /* id가 title인 요소의 글자색 */
        }
    </style>
</head>
<body>
    <h1 id="title">id가 title인 헤딩입니다.</h1>
</body>
</html>
