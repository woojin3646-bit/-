<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [div 태그]
            1. div 태그는 특별한 의미를 가지지 않는 태그입니다.
            2. 여러 요소를 하나의 영역으로 묶기 위해 사용됩니다.
            3. 주로 레이아웃이나 스타일 적용을 위해 사용됩니다.
        */
        
        div {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div>첫 번째 div 영역입니다.</div>
    <div>두 번째 div 영역입니다.</div>
</body>
</html>
