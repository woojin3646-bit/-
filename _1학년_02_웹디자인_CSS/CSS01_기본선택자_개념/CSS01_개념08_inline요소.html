<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [inline 요소]
            1. inline 요소는 줄바꿈이 발생하지 않습니다.
            2. 글자처럼 나란히 배치됩니다.
            3. 대표적인 inline 요소 : span
        */
        
        span {
            background-color: lightgreen
        }
    </style>
</head>
<body>
    <p>
        inline 요소는
        <span>이렇게</span>
        <span>줄바꿈</span>
        <span>되지 않습니다.</span>
    </p>
</body>
</html>
