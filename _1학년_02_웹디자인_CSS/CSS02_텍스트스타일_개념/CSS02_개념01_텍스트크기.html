<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [텍스트 크기]
            1. CSS에서 font-size 속성은 텍스트의 크기를 설정합니다.
            2. 텍스트 크기는 주로 px(픽셀) 단위로 지정되며, 이는 텍스트의 높이 값이 됩니다.
                높이에 비례하여 폭이 넓어지는 원리입니다.
            3. 일반적으로 웹에서 최소 텍스트 크기는 10px 이상을 권장합니다.
        */
        
        .gkdl {
            font-size: 100px;
        }
        .nrrasmrld {
            font-size: 3px;
        }
    </style>
</head>
<body>
    <h1 class="gkdl">원래는 가장 큰</h1>
    <h6 class="nrrasmrld">원래는 가장 작은</h6>
</body>
</html>
