<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [텍스트 기울기]
            1. font-style 속성은 텍스트를 기울여 표시하는 속성입니다.
            2. 주로 강조, 인용문, 부가 설명 등에 사용됩니다.
            3. font-style 속성 값
                (1) normal
                    - 기본 상태(기울기 없음)
                (2) italic
                    - 폰트에 이탤릭(italic) 글꼴이 있으면 해당 글꼴을 사용합니다.
                    - 없을 경우 브라우저가 글자를 기울여서 대신 표시합니다.
                (3) oblique
                    - 폰트의 이탤릭 여부와 관계없이,
                      글자를 강제로 기울여 표시합니다.
        */
        .normal {
            font-style: normal;
        }
        .italic {
            font-style: italic;
        }
        .oblique {
            font-style: oblique;
        }
    </style>
</head>
<body>
    <p class="normal">텍스트 기울기 normal 입니다.</p>
    <p class="italic">텍스트 기울기 italic 입니다.</p>
    <p class="oblique">텍스트 기울기 oblique 입니다.</p>    
</body>
</html>
