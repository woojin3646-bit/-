<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [텍스트 자간]
            1. letter-spacing 속성은 텍스트의 자간을 설정할 수 있습니다.
            2. 자간이란 각 문자와 문자 사이의 간격을 의미합니다.
            3. 자간의 단위는 주로 px(픽셀) 로 설정하며, 양수 값은 자간을 넓히고 음수 값은 자간을 좁힙니다.
        */
        
        h1 {
            letter-spacing: 0px;
        }
        h2 {
            letter-spacing: 8px;
        }
        h3 {
            letter-spacing: -2px;
        }
    </style>
</head>
<body>
    <h1>기본 자간</h1>
    <h2>자간이 8px</h2>
    <h3>자간이 -2px</h3>
</body>
</html>
