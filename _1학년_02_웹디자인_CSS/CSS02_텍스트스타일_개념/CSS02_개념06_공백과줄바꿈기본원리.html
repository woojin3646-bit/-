<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [공백과 줄바꿈 기본 원리]
            1. HTML은 기본적으로 
               - 연속된 공백(스페이스)을 하나의 공백으로 처리합니다.
               - 엔터(줄바꿈)도 하나의 공백으로 처리합니다.
            2. 따라서 HTML 코드에서 엔터를 입력해도 
               브라우저 화면에서는 그대로 줄바꿈되지 않습니다.
            3. 텍스트의 줄바꿈에는 두 가지가 있습니다.
                (1) 브라우저 줄바꿈
                    - 화면 너비(창 크기)에 따라 자동으로 줄이 바뀝니다.
                    - 텍스트가 길어지면 다음 줄로 자동 이동합니다.
                (2) 의도적 줄바꿈(엔터)
                    - 우리가 코드에서 직접 입력한 줄바꿈입니다.
                    - 기본 설정에서는 무시되어 화면에 반영되지 않습니다.
        */        
        .box {
            background-color: aquamarine;
        }

    </style>
</head>
<body>
    <div class="box">
        공백을          여러 번          넣었습니다.
        엔터로 줄을 바꿨습니다.
        하지만 화면에서는 공백 하나처럼 보이고 엔터도 줄바꿈으로 적용되지 않습니다.
        글이 길어지면 브라우저 너비에 따라 자동으로 줄바꿈이 발생합니다.
    </div>  
 
</body>
</html>
