<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		/*
			[텍스트 장식]
			1. text-decoration 속성은 텍스트에 장식 선을 추가하는 속성입니다.
			2. 주로 링크, 제목, 강조 표현에 사용됩니다.
			3. text-decoration 속성 값
				(1) none			: 장식 없음
				(2) underline		: 밑줄
				(3) overline		: 윗줄
				(4) line-through	: 취소선
		*/

		.over { text-decoration:overline; }			
		.through { text-decoration:line-through; }		
		.under { text-decoration:underline; }	
	</style>
</head>
<body>
	<h3 class="over">텍스트 장식의 예입니다.</h3>
	<h3 class="through">텍스트 장식의 예입니다.</h3>
	<h3 class="under">텍스트 장식의 예입니다.</h3>
</body>
</html>
