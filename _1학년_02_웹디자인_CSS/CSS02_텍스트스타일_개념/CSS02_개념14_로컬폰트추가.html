<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [로컬 폰트 추가]
            1. 사용자의 PC에 어떤 폰트가 설치되어 있는지는 알 수 없기 때문에,
               같은 HTML/CSS 라도 컴퓨터마다 글꼴이 다르게 보일 수 있습니다.
            2. @font-face 는 웹페이지가 프로젝트의 폰트 파일을 불러와서 사용하는 기능입니다.
               즉, 브라우저 안에서만 임시로 적용됩니다.
            3. @font-face 문법
                @font-face {
                    font-family: '사용할 폰트 이름';
                    font-weight: 폰트 굵기 (선택 사항);
                    src: url('폰트 파일 경로');
                }
            4. 같은 font-family 이름으로 여러 번 선언하면,
               font-weight 값에 따라 서로 다른 폰트 파일을 연결할 수 있습니다.   
            5. font-weight를 생략하면 기본값은 400(normal) 입니다.
        */

        /*
            [네이버 마루 부리 폰트 추가하기]
            1. 네이버 글꼴 모음(https://hangeul.naver.com/font)에서 마루 부리 폰트를 다운로드 합니다.
            2. 다운로드한 폰트 파일을 프로젝트의 fonts 폴더에 저장합니다.
            3. 다양한 폰트 굵기를 설정하려면 각각의 @font-face 규칙을 추가합니다.
        */        

        @font-face {
            font-family: maru-buri;
            font-weight: 200;
            src: url('fonts/MaruBuri-ExtraLight.ttf');
        }

        @font-face {
            font-family: maru-buri;
            font-weight: 300;
            src: url('fonts/MaruBuri-Light.ttf');
        }

        @font-face {
            font-family: maru-buri;
            font-weight: 400;
            src: url('fonts/MaruBuri-Regular.ttf');
        }

        @font-face {
            font-family: maru-buri;
            font-weight: 600;
            src: url('fonts/MaruBuri-SemiBold.ttf');
        }

        @font-face {
            font-family: maru-buri;
            font-weight: 700;
            src: url('fonts/MaruBuri-Bold.ttf');
        }

        .normal {
            font-family: maru-buri, sans-serif;
            /* font-weight: 400; */
        }

        .bold {
            font-family: maru-buri, sans-serif;
            font-weight: 700;
        }        
    </style>
</head>
<body>
    <div class="normal">
        평범한 마루부리(400)
    </div>

    <div class="bold">
        굵은 마루부리(700)
    </div>  
</body>
</html>
