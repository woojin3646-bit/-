<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [리스트 기호 변경 ul]
            1. list-style-type 속성으로 
               <ul>, <ol>의 기호(불릿/번호) 형태를 바꿀 수 있습니다.
            2. list-style-type <ul>에서 자주 사용하는 속성 값
                - disc      : ● (기본값)
                - circle    : ○
                - square    : ■
        */

        .circle {            
            list-style-type: circle;        
        }
        .disc {
            list-style-type: disc;        
        }
        .square {            
            list-style-type: square;        
        }        
    </style>
</head>
<body>
    <h2>불릿 모양 바꾸기</h2>

    <ul class="circle">
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JAVASCRIPT</li>
    </ul>

    <ul class="disc">
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JAVASCRIPT</li>
    </ul>

    <ul class="square">
        <li>HTML5</li>
        <li>CSS3</li>
        <li>JAVASCRIPT</li>
    </ul>    
</body>
</html>
