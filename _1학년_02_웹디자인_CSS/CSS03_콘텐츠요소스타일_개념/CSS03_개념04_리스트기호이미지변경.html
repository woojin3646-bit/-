<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [리스트 기호 이미지 변경]
            1. list-style-type 속성을 사용하면 불릿을 이미지로 바꿀 수 있습니다.
            2. url('경로') 형태로 이미지 파일을 지정합니다.
            3. 이미지가 너무 크면 보기 불편할 수 있어,
               작은 아이콘(16~24px 정도)을 사용하는 것이 좋습니다.
        */

        .img-bullet {
            list-style-image: url('images/logo.png');
        }
    </style>
</head>
<body>
    <h2>이미지 불릿 사용</h2>

    <ul class="img-bullet">
        <li>순서가</li>
        <li>없는</li>
        <li>리스트</li>
    </ul>  

    <ol class="img-bullet">
        <li>순서가</li>
        <li>있는</li>
        <li>리스트</li>
    </ol>      
</body>
</html>
