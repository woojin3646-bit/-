<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [리스트 기호 없애기]
            1. list-style-type: none; 을 사용하면
               불릿(●) 이나 번호(1,2,3)를 제거할 수 있습니다.
            2. 메뉴/네비게이션을 만들 때 자주 사용합니다.
        */

        .no-style {
            list-style-type: none;
        }
      
    </style>
</head>
<body>
    <h2>기호/번호 제거</h2>

    <ul class="no-style">
        <li>순서가</li>
        <li>없는</li>
        <li>리스트</li>
    </ul>
    
    <ol class="no-style">
        <li>순서가</li>
        <li>있는</li>
        <li>리스트</li>
    </ol>
</body>
</html>
