<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [블릿 위치 변경]
            1. list-style-position 속성은 불릿(또는 번호)이 어디에 찍히는지를 결정합니다.
			2. list-style-position 속성 값
				(1) outside		: 기본값, 불릿이 박스 바깥쪽에 위치
				(2) inside		: 불릿이 내용 안쪽에 위치
        */

        .inside {
            list-style-position: inside;
        }
      
    </style>
</head>
<body>
    <h3>outside (기본)</h3>
    <ul>
        <li>이 문장은 길어서 자동으로 줄이 바뀌는 예제입니다. 이 문장은 길어서 자동으로 줄이 바뀌는 예제입니다.</li>
    </ul>

    <h3>inside</h3>
    <ul class="inside">
        <li>이 문장은 길어서 자동으로 줄이 바뀌는 예제입니다. 이 문장은 길어서 자동으로 줄이 바뀌는 예제입니다.</li>
    </ul>
</body>
</html>
