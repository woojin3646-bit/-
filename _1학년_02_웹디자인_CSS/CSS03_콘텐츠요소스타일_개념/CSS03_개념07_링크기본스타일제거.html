<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		/*
			[링크 기본 스타일 제거]
			1. a태그는 기본적으로 파란색 글자와 밑줄이 적용되어 있습니다.
			2. text-decoration 속성을 사용하면 밑줄을 제거할 수 있습니다.
			3. color 속성을 사용하여 링크 색상을 원하는 색으로 변경할 수 있습니다.
		*/
		.link {
			text-decoration: none;
			color: black;
		}
	</style>
</head>
<body>
	<a href="#">원본</a>

	<br>

	<a class="link" href="#">디자인 적용</a>
</body>
</html>
