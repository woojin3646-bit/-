<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		/*
			[input 기본 스타일]
            1. input 요소도 CSS를 사용하여
                크기와 글자 스타일을 변경할 수 있습니다.
            2. border 속성은 요소의 테두리를 설정하는 속성으로,
               입력 영역의 경계를 시각적으로 구분할 때 사용합니다.
            3. border-radius 속성은 테두리의 모서리를 둥글게 만들어
               입력창의 모양을 부드럽게 표현할 수 있습니다.
		*/

        .textInput {
            width: 200px;
            height: 30px;
            font-size: 14px;
            border: 1px solid #999;
            border-radius: 5px;
        }
	</style>
</head>
<body>

    <input type="text">

    <hr>

    <input type="text" class="textInput">
    
</body>
</html>
