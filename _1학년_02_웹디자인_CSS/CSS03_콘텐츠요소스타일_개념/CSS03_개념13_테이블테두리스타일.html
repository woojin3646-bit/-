<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [테이블 테두리 스타일]
            1. table, th, td 태그를 선택자로 사용하면
               테이블 전체와 각 셀에 한 번에 스타일을 적용할 수 있습니다.
            2. border 속성은 요소의 테두리를 설정하는 속성입니다.
               (두께, 선 스타일, 색상 순으로 적용)
            3. table과 셀(th, td)에 모두 border를 적용하면
               테두리가 겹쳐 보이는 현상이 발생합니다.
            4. 이 현상은 테이블의 기본 구조 때문이며,
               다음 예제에서 해결 방법을 다룹니다.
        */
        
        table, th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>이메일</th>
        </tr>
        <tr>
            <td>김철수</td>
            <td>chul@google.com</td>
        </tr>
        <tr>
            <td>김영희</td>
            <td>young@google.com</td>
        </tr>
    </table>    
</body>
</html>
