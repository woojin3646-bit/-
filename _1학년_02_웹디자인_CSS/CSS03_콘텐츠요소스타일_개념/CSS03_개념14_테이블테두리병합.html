<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [테이블 테두리 병합]
            1. border-collapse 속성은 테이블의 테두리 표시 방식을 결정합니다.
            2. collapse 값을 사용하면,
               table과 셀(th, td)의 테두리를 하나로 합쳐 표시합니다.
            3. table과 셀의 역할이 다르기 때문에
               선택자를 분리하여 스타일을 적용하는 것이 좋습니다.
        */
        table {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>이메일</th>
        </tr>
        <tr>
            <td>김철수</td>
            <td>chul@google.com</td>
        </tr>
        <tr>
            <td>김영희</td>
            <td>young@google.com</td>
        </tr>
    </table>    
</body>
</html>
