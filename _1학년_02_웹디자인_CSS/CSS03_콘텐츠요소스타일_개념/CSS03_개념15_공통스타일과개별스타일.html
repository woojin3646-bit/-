<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [공통 스타일과 개별 스타일]
            1. 여러 요소에 공통적으로 적용되는 스타일은
               태그 선택자나 공통 클래스로 한 번에 작성할 수 있습니다.
            2. 각 요소마다 다른 스타일이 필요한 경우에는
               class 선택자를 사용하여 개별적으로 스타일을 추가합니다.
            3. 이렇게 하면 코드가 깔끔해지고, 수정과 관리가 쉬워집니다.
        */

        /* 모든 문단에 공통 적용 */
        p {
            font-size: 16px;
            color: black;
        }

        /* 각 문단의 개별 스타일 */
        .important {
            color: red;
            font-weight: bold;
        }
        .notice {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    
    <p>기본 문단입니다.</p>

    <p class="important">중요한 문단입니다.</p>

    <p class="notice">안내 문단입니다.</p>

</body>
</html>
