<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [색 이름 방식] 
            1. CSS에서는 미리 정의된 색상 이름을 사용하여 색을 지정할 수 있습니다.
            2. 예: red, blue, green, black, white
            3. 간단하고 빠르게 적용할 때 편리하지만,
               표현 가능한 색이 제한적이므로 HEX나 RGB를 더 자주 사용합니다.
            4. https://htmlcolorcodes.com/color-names/
        */    
            
        .name-red {
            background-color: red;
        }
        .name-green {
            background-color: green;
        }
        .name-blue {
            background-color: blue;
        }
    </style>
</head>
<body>
    <h3 class="name-red">background-color: red;</h3>
    <h3 class="name-green">background-color: green;</h3>
    <h3 class="name-blue">background-color: blue;</h3>
</body>
</html>
