<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [RGB 색상 표현]
            1. 모니터는 빛의 삼원색인 빨강(R), 초록(G), 파랑(B)을 섞어 색을 표현합니다.
            2. rgb(R, G, B) 형태로 작성하며, 각 값은 0~255 범위입니다.
                - 0     : 빛이 꺼진 상태
                - 255   : 빛이 가장 강한 상태
            3. 예)
                - rgb(255, 0, 0)    : 빨강
                - rgb(0, 255, 0)    : 초록
                - rgb(0, 0, 255)    : 파랑
        */    
            
        .rgb-red {
            background-color: rgb(255, 0, 0);
        }
        .rgb-green {
            background-color: rgb(0, 255, 0);
        }
        .rgb-blue {
            background-color: rgb(0, 0, 255)
        }
    </style>
</head>
<body>
    <h3 class="rgb-red">background-color: rgb(255, 0, 0);</h3>
    <h3 class="rgb-green">background-color: rgb(0, 255, 0);</h3>
    <h3 class="rgb-blue">background-color: rgb(0, 0, 255);</h3>
</body>
</html>
