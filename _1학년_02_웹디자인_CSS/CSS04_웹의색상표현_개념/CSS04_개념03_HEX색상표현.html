<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [HEX 색상 표현]
            1. HEX 코드는 RGB 값을 16진수로 표현한 방식입니다.
            2. 형식 : #RRGGBB
                - RR    : 빨강(00 ~ FF)
                - GG    : 초록(00 ~ FF)
                - BB    : 파랑(00 ~ FF)
            3. 예)
                - #FF0000    : 빨강
                - #00FF00    : 초록
                - #0000FF    : 파랑
        */    
            
        .rgb-red {
            background-color: #FF0000;
        }
        .rgb-green {
            background-color: #00FF00
        }
        .rgb-blue {
            background-color: #0000FF;
        }
    </style>
</head>
<body>
    <h3 class="rgb-red">background-color: #FF0000;</h3>
    <h3 class="rgb-green">background-color: #00FF00;</h3>
    <h3 class="rgb-blue">background-color: #0000FF;</h3>
</body>
</html>
