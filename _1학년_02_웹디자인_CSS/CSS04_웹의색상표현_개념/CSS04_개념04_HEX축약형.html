<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [HEX 축약형]
            1. HEX 코드는 경우에 따라 3자리로 축약해서 쓸 수 있습니다.
            2. 조건: 각 값이 같은 숫자로 반복되는 경우에만 가능
                - #FF0000 → #F00
                - #00FF00 → #0F0
                - #0000FF → #00F
                - #FFFFFF → #FFF
                - #000000 → #000
        */    
            
        .full {
            background-color: #FF00CC;
        }
        .short {
            background-color: #F0C
        }
    </style>
</head>
<body>
    <h3 class="full">#FF00CC (6자리)</h3>
    <h3 class="short">#F0C (3자리 축약형)</h3>
</body>
</html>
