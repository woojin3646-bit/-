<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 크기 단위 비교]
            1. 박스의 크기는 고정된 값(px) 또는 비율(%)로 지정할 수 있습니다.
            2. px 단위는 항상 같은 크기를 유지하는 고정 크기입니다.
            3. % 단위는 기준이 되는 크기에 비례하여 크기가 결정됩니다.
        */

        .px {
            background-color: aquamarine;
            width: 200px;
            height: 80px;
        }
        .percent {
            background-color: antiquewhite;
            width: 50%;
            height: 80px;
        }
    </style>
</head>
<body>
    <div class="px">
        width: 200px (고정 크기)
    </div>

    <div class="percent">
        width: 50% (비율 크기)
    </div>
</body>
</html>
