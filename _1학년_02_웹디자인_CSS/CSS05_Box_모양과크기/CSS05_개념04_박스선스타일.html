<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 선 스타일]
            1. border 속성은 박스의 테두리(선)를 설정하는 속성입니다.
            2. 테두리는 다음 세 가지 요소로 구성됩니다.
                - 두께(border-width)
                - 스타일(border-style)
                - 색상(border-color)
            3. 이 세 가지 속성은 각각 따로 설정할 수도 있고,
               border 속성을 사용하여 한 줄로 함게 설정할 수도 있습니다.
            4. 가장 많이 사용하는 작성 방법은 다음과 같습니다.
                border: 두께 스타일 색상;
                예) border: 1px solid red;
        */

        .box1 {
            width: 150px;
            height: 150px;

            border-width: 1px;
            border-style: solid;
            border-color: red;
        }

      
        .box2 {
            width: 150px;
            height: 150px;
            border: 5px solid blue;   /* border 단축 속성을 사용한 경우 */
        }
    </style>
</head>
<body>
    <div class="box1"></div>    

    <br>
    
    <div class="box2"></div>    
</body>
</html>
