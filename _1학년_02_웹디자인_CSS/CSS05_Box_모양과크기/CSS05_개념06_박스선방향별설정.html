<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 선 방향별 설정]
            1. border 속성은 상하좌우 방향별로 나누어 설정할 수 있습니다.
            2. 방향별 테두리 속성
                (1) border-top
                (2) border-right
                (3) border-bottom
                (4) border-left
            3. 각 방향의 테두리는
               두께, 스타일, 색상을 각각 다르게 지정할 수 있습니다.
            4. 이 방식은 특정 방향에만 테두리를 주고 싶을 때 사용합니다.
        */

        div {
            width: 100px;
            height: 100px;

            border-top: 5px dotted green;
            border-left: 5px solid red;
            border-right: 5px dashed yellow;
            border-bottom: 5px double blue; 
        }
    </style>
</head>
<body>

    <div></div>

</body>
</html>
