<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 선 없애기]
            1. border 속성의 none 값은 테두리를 표시하지 않겠다는 의미입니다.
            2. border-top, border-right, border-bottom, border-left처럼
               특정 방향의 테두리만 제거할 수도 있습니다.
            3. 주로 형제 요소가 나란히 배치될 때,
               테두리가 겹쳐 보이는 현상을 해결하기 위해 사용됩니다.
            4. 아래 예제에서는 위쪽 테두리를 제거하여
               테두리 중복을 방지합니다.
        */


        div {
            border: 1px solid black;
        }

        .box2 {
            border-top: none;
        }
    </style>
</head>
<body>

    <div>첫 번째 박스</div>
    <div class="box2">두 번째 박스 (위쪽 테두리 제거)</div>

</body>
</html>
