<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [브라우저 기본 스타일]
            1. 모든 HTML 태그에는 브라우저가 미리 적용해 둔 기본 CSS 스타일이 있습니다.
            2. 이 기본 스타일에는 글자 크기, 줄 간격, 여백 등이 포함됩니다.
            3. 브라우저마다 기본 스타일 값이 약간씩 다를 수 있습니다.
            4. <body> 태그에도 기본 겉 여백(margin)이 적용되어 있으며,
                이로 인해 아무 스타일을 주지 않아도 화면 가장자리와 내용 사이에
                여백이 생깁니다.
            5. 실제 웹 개발에서는 이 기본 스타일을 제거하거나
                원하는 값으로 다시 설정하는 경우가 많습니다.
            6. 개발자 도구(F12)를 사용하여 이 기본 여백을 확인할 수 있습니다.
                (1) F12키 누르기
                (2) 개발자 도구 왼쪽 Elements 탭 클릭
                (3) HTML 구조에서 <body> 태그 클릭
                (4) Styles 또는 Computed 패널 확인
                    - margin    : 요소와 요소 사이의 바깥 여백
                    - border    : 요소의 테두리(경계선)
                    - padding   : 테두리와 내용 사이의 안쪽 여백
                    - content   : 실제 내용 영역
            7. 다음 예제에서는 <body> 태그의 겉 여백을 제거하여 브라우저의 기본 여백 설정을 없애 보겠습니다.
        */
    </style>
</head>
<body>

    <div>
        웹 개발에서 여백은 정말 중요해요.
    </div>
    
</body>
</html>
