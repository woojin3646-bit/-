<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [브라우저 기본 여백 제거]
            1. margin 속성은 요소의 바깥쪽 여백(겉 여백)을 설정하는 속성입니다.
            2. 브라우저는 기본적으로 <body> 태그에 일정한 겉 여백(margin)을 적용합니다.
            3. margin: 0;을 사용하면 이 기본 여백을 제거할 수 있습니다.
            4. 실제 웹 개발에서는 레이아웃을 정확히 맞추기 위해
                body의 기본 여백을 먼저 제거하는 경우가 많습니다.
        */

        body {
            margin: 0;
        }
    </style>
</head>
<body>

    <div>
        웹 개발에서 여백은 정말 중요해요.
    </div>
    
</body>
</html>
