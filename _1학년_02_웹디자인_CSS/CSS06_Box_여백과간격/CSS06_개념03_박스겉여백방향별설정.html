<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 겉 여백 방향별 설정]
            1. margin은 요소의 바깥쪽 여백(겉 여백)을 의미합니다.
            2. margin은 상, 하, 좌, 우 방향별로 각각 설정할 수 있습니다.
            3. 방향별 margin 속성
                - margin-top        : 위쪽 겉 여백
                - margin-right      : 오른쪽 겉 여백
                - margin-bottom     : 아래쪽 겉 여백
                - margin-left       : 왼쪽 겉 여백
            4. 특정 방향에만 여백을 주어
                요소들 사이의 간격을 조절할 수 있습니다.
        */

        div {
            width: 100px;
            height: 100px;
            background-color: antiquewhite;
        }
        .box1 {
            margin-top: 16px;
        }
        .box2 {
            margin-left: 16px;
        }
    </style>
</head>
<body>
    <div>기본 박스</div>

    <div class="box1">위쪽에 16px 여백</div>
    <div class="box2">왼쪽에 16px 여백</div>

</body>
</html>
