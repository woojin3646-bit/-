<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 속 여백]
            1. paddding은 요소의 내부 콘텐츠와 테두리(border) 사이의 여백입니다.
            2. padding을 적용하면 요소의 실제 크기가 커집니다.
            3. width와 height는 콘텐츠 영역(content)의 크기이며,
                padding은 이 크기 바깥으로 추가됩니다.
        */

        div {
            width: 100px;
            height: 100px;
            background-color: aquamarine;

            margin-bottom: 20px;
        }
        .box {
            padding: 16px;
        }
    </style>
</head>
<body>

    <div>
        padding이 없는 영역
    </div>

    <div class="box">
        padding이 적용된 영역
    </div>

</body>
</html>
