<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 크기 계산 방식]
            1. 두 요소에 동일한 width와 height를 설정하더라도,
                padding의 유무에 따라 실제 크기는 달라질 수 있습니다.
            2. 이는 width와 height가 콘텐츠(content) 영역만을 기준으로
                계산되기 때문입니다.
            3. 이러한 크기 차이는 레이아웃을 구성할 때
                불편함을 만들 수 있습니다.
            4. 실제 크기는 개발자 도구(F12)를 통해 확인할 수 있습니다.
        */

        div {
            width: 150px;
            height: 150px;
            background-color: aquamarine;
            margin-bottom: 20px;

            border: 3px solid blue;
        }

        .box {
            padding: 16px;
            background-color: beige;
        }
    </style>
</head>
<body>

    <div>
        padding 없음<br>
        width 150px + border 3px x 2 = 156px
    </div>
   
    <div class="box">
        padding 있음<br>
        width 150px + padding 16px x 2 + border 3px  x 2 = 188px
    </div>

</body>
</html>
