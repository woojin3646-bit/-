<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [박스 가로 중앙 정렬]
            1. 박스 요소를 화면 가운데로 옮기려면 margin을 이용할 수 있습니다.
            2. margin: 0 auto; 는
                - 위/아래 여백은 0
                - 왼쪽/오른쪽 여백을 자동(uato)으로 맞춰 가운데 정렬합니다.
            3. 주의
                - width(폭)가 있어야 가운데 정렬이 눈에 보입니다.
        */

        .box {
            width: 200px;
            height: 120px;
            background-color: aquamarine;

            /* 위아래 30px, 좌우auto */
            margin: 30px auto;
        }
    </style>
</head>
<body>
    <div class="box">가로 중앙 정렬</div>
</body>
</html>
