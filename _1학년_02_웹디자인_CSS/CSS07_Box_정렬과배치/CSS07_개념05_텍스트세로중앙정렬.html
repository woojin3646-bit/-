<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [텍스트 세로 중앙 정렬]
            1. line-height는 줄의 높이를 의미하는 속성입니다.
            2. 요소의 height 값과 line-height 값을 동일하게 설정하면,
                텍스트가 세로 방향으로 가운데 정렬된 것처럼 보입니다.
            3. 이 방법은 한 줄 텍스트일 때만 정확하게 동작하며,
                여러 줄 텍스트에는 적합하지 않습니다.
        */

        body {
            margin: 0;
        }

        .box {
            width: 200px;
            height: 120px;
            background-color: aquamarine;

            margin: 30px auto;
            text-align: center;
            line-height: 120px;
        }
    </style>
</head>
<body>
    <div class="box">가로세로 중앙 정렬</div>
</body>
</html>
