<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [태그 선택자]
            1. 태그 선택자는 HTML 태그 이름을 그대로 사용하여
                해당 태그를 모두 선택하는 방식입니다.
            2. 같은 태그라면 문서 안에 몇 개가 있든
                모두 동일한 스타일이 적용됩니다.
            3. 태그 선택자는 구조가 단순하고 범위가 넓기 때문에
                기본 스타일을 설정할 때 자주 사용됩니다.
            4. 단점으로는 특정 요소 하나만 선택하지 어렵기 때문에,
                세부적인 스타일 제어에는 클래스 선택자를 함께 사용합니다.
        */

        p {
            color: red;
        }

        span {
            color: blue;
        }        
    </style>
</head>
<body>

    <p>p 태그는 모두 빨간색으로 표시됩니다.</p>

    <p>이 p 태그는 모두 빨간색으로 표시됩니다.</p>

    <span>span 태그는 파란색으로 표시됩니다.</span>

</body>
</html>
