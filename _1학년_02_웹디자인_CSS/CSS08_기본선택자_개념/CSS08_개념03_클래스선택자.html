<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [클래스 선택자]
            1. 클래스 선택자는 HTML 요소에 지정된 class 속성을 기준으로
                해당 클래스를 가진 요소들을 선택하는 방식입니다.
            2. 하나의 클래스는 문서 안에서 여러 번 사용할 수 있으며,
                같은 클래스를 가진 모든 요소에 동일한 스타일이 적용됩니다.
            3. 클래스 선택자는 CSS에서 .(점)을 사용하여 정의합니다.
            4. 클래스 이름은 대소문자를 구분하므로,
                class="box"와 class="Box"는 서로 다른 클래스로 인식합니다.
        */

        .red {
            color: red;
        }
        .box {
            color: green;
        }
        .Box {
            color: blue;
        }        
    </style>
</head>
<body>

    <div class="red">빨간색 텍스트1</div>
    <div class="red">빨간색 텍스트2</div>
    <div class="box">소문자 box는 초록색</div>
    <div class="Box">대문자 Box는 파란색</div>   
</body>
</html>
