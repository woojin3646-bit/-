<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [다중 클래스]
            1. 하나의 요소에는 여러 개의 클래스를 동시에 적용할 수 있습니다.
            2. 여러 클래스를 적용할 때는 class 속성 안에서
                각 클래스 이름을 띄어쓰기로 구분하여 작성합니다.
            3. 적용된 모든 클래스의 스타일이 합쳐져서 요소에 적용됩니다.
            4. 다중 클래스는 스타일을 기능별로 분리하여 관리할 수 있어
                재사용성과 유지보수에 매우 유리합니다.
        */

        .red {
            color: red;
        }
        .bg-yellow {
            background-color: yellow;
        }
        .font-lg {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div>
        <p>클래스는 <span class="red">역할 단위로 나누어</span> 사용하는 것이 좋습니다.</p>
        <p>아래 문장은 <span class="font-lg">글자 크기</span>와 <span class="bg-yellow">배경색</span>을 각각 다른 클래스로 적용했습니다.</p>
        <p><span class="font-lg bg-yellow">다중 클래스를 사용한 텍스트 예제</span></p>
    </div>
    
</body>
</html>
