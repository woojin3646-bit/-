<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [아이디 선택자]
            1. 아이디 선택자는 HTML 문서 내에서
                단 하나의 요소만 선택하기 위해 사용됩니다.
            2. 하나의 HTML 문서에서는
                동일한 아이디를 여러 요소에 사용할 수 없습니다.
            3. 아이디 선택자는 CSS에서 #을 사용하여 정의합니다.
            4. 아이디 이름은 대소문자를 구분하므로,
                id="box"와 id="Box"는 서로 다른 아이디로 인식됩니다.
        */

        #red {
            color: red;
        }        
        #box {
            color: green;
        }
        #Box {
            color: blue;
        }
    </style>
</head>
<body>

    <div id="red">빨간색 텍스트</div>
    <div id="box">소문자 box는 초록색</div>
    <div id="Box">대문자 Box는 파란색</div>   

</body>
</html>
