<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [클래스 선택자와 아이디 선택자의 혼용]
            1. 공통된 스타일은 클래스 선택자로 정의합니다.
            2. 각 요소의 개별적인 스타일은 아이디 선택자로 정의합니다.
            3. 이와 같이 공통 스타일은 클래스,
                개별 스타일은 아이디로 분리하여 사용하는 것이 바람직합니다.
        */

        .square {
            width: 100px;                
            height: 100px;  
            margin-bottom: 20px;     
            text-align: center;        
            line-height: 100px;
        }

        #blueBox {
            background-color: blue;       
            color: white;                 
        }
        #redBox {
            background-color: red;
        }
    </style>
</head>
<body>

    <div id="blueBox" class="square">Blue Box</div>
    <div id="redBox" class="square">Red Box</div>

</body>
</html>
