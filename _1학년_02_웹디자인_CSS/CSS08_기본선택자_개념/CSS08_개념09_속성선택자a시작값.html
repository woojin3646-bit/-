<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [속성 선택자 a 시작값]
            1. 속성 선택자는 속성의 "값"을 기준으로도 요소를 선택할 수 있습니다.
            2. ^= 기호는 "해당 값으로 시작하는 경우"를 의미합니다.
            3. a[href^="https"]는
                href 속성 값이 "https"로 시작하는 모든 a 태그를 선택합니다.
        */

        a[href^="https"] {
            color: green;
            font-weight: bold;     
        }
    </style>
</head>
<body>
    <a href="https://www.example.com">안전한 링크</a>
    <br>
    <a href="http://www.example.com">일반 링크</a>
</body>
</html>
