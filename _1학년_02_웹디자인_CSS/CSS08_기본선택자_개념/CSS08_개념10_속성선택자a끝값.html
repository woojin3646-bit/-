<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [속성 선택자 a 끝값]
            1. 속성 선택자는 속성의 "값"을 기준으로도 요소를 선택할 수 있습니다.
            2. $= 기호는 "해당 값으로 끝나는 경우"를 의미합니다.
            3. a[href=".pdf"]는
                href 속성 값이 ".pdf"로 끝나는 모든 a태그를 선택합니다.
        */

        a[href$=".pdf"] {
            color: red;
            text-decoration: underline;     
            font-weight: bold;              
        }
    </style>
</head>
<body>

    <p>아래의 링크를 클릭하여 파일을 다운로드하세요.</p>

    <a href="document.pdf" download>PDF 파일 다운로드</a>

</body>
</html>
