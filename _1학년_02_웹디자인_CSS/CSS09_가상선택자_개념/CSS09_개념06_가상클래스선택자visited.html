<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [가상 클래스 선택자 :visited]
            1. :visited 는 사용자가 이미 방문한 링크를 선택합니다.
            2. 이 가상 클래스는 a 태그만 사용할 수 있습니다.
            3. 링크를 클릭해 사이트를 방문한 후 다시 돌아오면,
                방문한 링크의 색상이 변경됩니다.
        */

        a:visited {
            color: red;
        }
    </style>
</head>
<body>

    <a href="https://www.google.com">구글</a>
    <a href="https://www.kakao.com">카카오</a>

</body>
</html>
