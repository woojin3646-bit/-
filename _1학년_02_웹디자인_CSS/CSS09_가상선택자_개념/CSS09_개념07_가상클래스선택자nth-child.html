<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            [가상 클래스 선택지 :nth-child]
            1. :nth-child(n) 은 부모 요소의 자식 요소 중 n번째 요소를 선택합니다.
            2. 순서는 1부터 시작합니다.
            3. 클래스나 태그가 아니라, 부모의 자식 순서를 기준으로 판단합니다.
            4. nth-child(2) 는 부모의 자식 순서를 기준으로 판단합니다.
        */

        .box {
            width: 150px;
            height: 150px;
            border: 2px solid blue;
            margin-bottom: 20px;
        }

        /* 2번째 자식 */
        .box:nth-child(2) {
            background-color: red;
        }
    </style>
</head>

    <div>
        <div class="box">첫 번째 상자</div>
        <div class="box">두 번째 상자</div>
        <div class="box">세 번째 상자</div>
    </div>

</body>
</html>
