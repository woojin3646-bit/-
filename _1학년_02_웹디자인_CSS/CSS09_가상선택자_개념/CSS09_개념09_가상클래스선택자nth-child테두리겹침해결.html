<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [가상 클래스 선택자 :nth-child 테두리 겹침 해결]
            1. 첫 번째 영역(box1)은 모든 요소에 동일한 테두리를 적용하여,
                상하로 겹치는 부분의 테두리가 두꺼워 보입니다.
            2. 두 번째 영역(box2)은 첫 번째 요소에만 상단 테두리를 적용하여,
                전체 테두리 두계가 균일하게 보이도록 처리했습니다.
            3. :nth-child는 각 부모 요소를 기준으로 독립적으로 동작합니다.
        */
        .box {
            width: 150px;
            height: 150px;
        }

        .box1 {
            border: 2px solid blue;     
        }
        
        .box2 {
            border: 2px solid red;

            /* 기본적으로 상단 테두리를 제거 */
            border-top: none;               
        }
        
        /* 첫 번째 box2 요소에만 상단 테두리 추가 */
        .box2:nth-child(1) {
            border-top: 2px solid red;
        }
    </style>
</head>
<body>

    <div>
        <div class="box box1">첫 번째 상자</div>
        <div class="box box1">두 번째 상자</div>
    </div>

        <br>
    <div>
        <div class="box box2">첫 번째 상자</div>
        <div class="box box2">두 번째 상자</div>
    </div>
    
</body>
</html>
