<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [결합자]
            1. CSS에서 결합자는 두 개 이상의 선택자를 결합하여 특정한 관계를 나타냅니다.
            2. 이를 통해 복잡한 구조에서도 정확한 요소를 선택하고 스타일을 적용할 수 있습니다.
            3. 결합자 종류
                - 형제 결합자, 인접 형제 결합자, 자식 결합자, 자손 결합자

            [형제 결합자]
            1. 형제 결합자는 같은 부모를 가진 요소들 중에서
                특정 요소 "이후에 위치한" 형제 요소들을 선택합니다.
            2. 구문: 선택자1 ~ 선택자2
            3. 선택자1 뒤에 나오는 모든 선택자2가 대상이 됩니다.
            4. 바로 인접하지 않아도 적용됩니다.
        */

        h1 ~ p {
            color: green;
        }
    </style>
</head>
<body>

    <h1>제목입니다.</h1>

    <p>이 문장은 녹색입니다.</p>
    <p>이 문장도 녹색입니다.</p>
    
</body>
</html>
