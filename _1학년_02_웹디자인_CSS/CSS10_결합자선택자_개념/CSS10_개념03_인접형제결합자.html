<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [인접 형제 결합자]
            1. 인접 형제 결합자는 같은 부모를 가진 형제 요소 중,
                특정 요소 바로 뒤에 오는 요소를 선택합니다.
            2. 구문: 선택자1 + 선택자2
            3. 선택자1 바로 다음에 위치한 첫 번재 선택자2만 선택됩니다.
        */

        h1 + p {
            color: blue;
        }
    </style>
</head>
<body>

    <h1>제목입니다.</h1>

    <p>이 문장은 파란색입니다.</p>
    <p>이 문장은 영향을 받지 않습니다.</p>

</body>
</html>
