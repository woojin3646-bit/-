<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [자손 결합자]
            1. 자손 결합자는 특정 요소 내부에 포함된
                모든 하위 요소(자식, 손자 등)를 선택합니다.
            2. 구문: 선택자1 선택자2
            3. 결합자 기호는 없으며, 띄어쓰기로 표현합니다.
        */

        div p {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div>
        <p>이 문장은 굵게 표시됩니다.</p>
        <div>
            <p>이 문장도 굵게 표시됩니다.</p>
        </div>
    </div>
    
</body>
</html>
