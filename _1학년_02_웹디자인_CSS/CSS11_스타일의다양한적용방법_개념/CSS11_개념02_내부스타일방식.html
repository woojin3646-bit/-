<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [내부 스타일 방식]
            1. <style> 태그를 사용하여 HTML 문서 내부에 CSS를 작성합니다.
            2. 현재 문서에만 스타일이 적용됩니다.
            3. 간단한 페이지나 테스트 용도로 적합합니다.
        */
        
        p {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <p>
        내부 스타일 방식이 적용된 문장입니다.
    </p>
</body>
</html>
