<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [2순위 아이디 선택자]
            1. CSS에는 스타일 적용 우선순위가 존재합니다.
            2. 아이디 선택자는 #id 형태로 작성하며,
                하나의 요소를 정확하게 지정할 때 사용합니다.
            3. 아이디 선택자는 태그 선택자와 클래스 선택자보다
                우선순위가 높습니다.
            4. 단, 인라인 스타일이 존재할 경우
                아이디 선택자보다 인라인 스타일이 우선 적용됩니다.
            5. 아래 예제에서는 div 태그에 빨간색을 지정했지만,
                아이디 선택자(#special)의 초론색이 최족 적용됩니다.
        */

        div {
            color: red;
        }
        
        #special {
            color: green;
        }
    </style>
</head>
<body>

    <div id="special">
        이 텍스트는 아이디 선택자 우선순위로 초록색입니다.
    </div>

</body>
</html>
