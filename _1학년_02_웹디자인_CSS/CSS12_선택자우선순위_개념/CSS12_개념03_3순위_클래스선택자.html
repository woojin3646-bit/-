<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [3순위 클래스 선택자]
            1. CSS에는 스타일 적용 우선순위가 존재합니다.
            2. 클래스 선택자는 .class 형태로 작성하며,
                여러 요소에 동일한 스타일을 적용할 때 사용합니다.
            3. 클래스 선택자는 태그 선택자보다 우선순위가 높고, 
                아이디 선택자보다 우선순위가 낮습니다.
            4. 아래 예제에서는 div 태그에 빨간색을 지정했지만,
                클래스 선택자(.highlight)의 노란색이 최종 적용됩니다.
        */

        div {
            color: red;
        }
        .highlight {
            color: yellow;
        }
    </style>
</head>
<body>

    <div class="highlight">
        이 텍스트는 클래스 선택자 우선순위로 노란색입니다.
    </div>

</body>
</html>
