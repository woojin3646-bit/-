<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [선택자 충돌]
            1. 동일한 종류의 선택자가 적용될 경우,
                선택자가 더 구체적인 규칙이 우선 적용됩니다.
            2. 단일 클래스 선택자보다
                다중 클래스 선택자가 더 구체적입니다.
            3. 우선순위와 구체성이 동일한 경우,
                CSS에서 나중에 작성된 규칙이 최종 적용됩니다.
            4. 아래 예제에서는 p 태그에 두 개의 클래스가 동시에 적용되어 있으며,
                .highlight, .special 보다 더 구체적인
                .highlight.special 규칙이 최종 적용됩니다.
        */

        p {
            color: green;
        }

        .highlight {
            color: blue;
        }

        .special {
            color: pink;
        }

        .highlight.special {
            color: brown;
        }
    </style>
</head>
<body>

    <p class="highlight special">
        텍스트 색상은?
    </p>

</body>
</html>
