<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [블록요소 - 부모와 자식의 높이 관계]
            1. 부모 요소의 height 기본값도 auto 입니다.
            2. 부모 요소의 기본 높이는
                내부 자식 요소의 높이에 의해 자동으로 결정됩니다.
            3. 부모에 height를 지정하지 않으면
                자식의 높이만큼 부모도 함께 늘어납니다.
            4. 자식의 height를 변경하면
                부모의 높이도 함께 변경됩니다.
            5. 부모의 높이는 상속되는 것이 아니라
                내부 콘텐츠 크기에 따라 계산되는 값입니다.
            6. 부모에 height를 직접 지정하면
                부모는 고정 높이를 유지합니다.
        */

        .parent {
            background-color: yellow;
            width: 300px;
        }
        .box {
            background: yellowgreen;
            width: 100px;
            height: 100px;
        }
        .parent2 {
            background-color: yellow;
            width: 300px;
            height: 300px;
        }        
    </style>
</head>
<body>
    <!-- 높이가 없는 부모 => 자식의 높이를 따름(100px) -->
    <div class="parent">
        <div class="box"></div>
    </div>

    <hr>
    
    <!-- 높이가 있는 부모와자식 => 각자의 높이를 유지 -->
    <div class="parent2">
        <div class="box"></div>
    </div>
</body>
</html>
