<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [블록요소 - height 고정값]
            1. height를 직접 지정하면
                콘텐츠와 관계없이 고정 높이를 가집니다.
            2. 내용이 많아도 지정한 높이를 유지합니다.
            3. 이때 내용이 넘치면 overflow 문제가 발생할 수 있습니다.
                이는 다음 예제에서 살펴보겠습니다.
        */

        .box {
            background: aqua;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>

    <div class="box"></div>
    
</body>
</html>
