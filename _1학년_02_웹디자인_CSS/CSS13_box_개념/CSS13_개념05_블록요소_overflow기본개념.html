<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [overflow 기본 개념]
            1. overflow는 자식 요소가 부모 영역을 초과했을 때
                그 초과된 콘텐츠를 어떻게 처리할지 결정하는 속성입니다.
            2. overflow: visible은 기본값입니다.
            3. 자식 요소가 부모 영역을 벗어나더라도
                잘리지 않고 그대로 화면에 표시됩니다.
        */

        .parent {
            width: 200px;
            height: 40px;
            background-color: blue;
            
            overflow: visible;    /* 기본값 */
        }

        .child {
            width: 100px;
            height: 100px;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
</body>
</html>
