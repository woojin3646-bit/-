<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [overflow: scroll 콘텐츠 안 넘침]
            1. overflow : scroll은
                콘텐츠가 부모 영역을 벗어나지 않아도
                스크롤을 항상 표시합니다.
            2. 현재 예제
                - 부모: 200px x 200px
                - 자식: 100px x 100px
                - 가로/세로 모두 넘치지 않습니다.
            3. 하지만 scroll 속성은
                조건 없이 스크롤을 생성합니다.
        */

        .parent {
            width: 200px;
            height: 200px;
            background-color: blueviolet;
            overflow: scroll; 
        }

        .child {
            width: 100px;
            height: 100px;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">
            자식 요소<br>
            가로도 넘치지 않고<br>
            세로도 넘치지 않는다.<br>
            무조건 스코롤이 생긴다.
        </div>
    </div>
</body>
</html>
