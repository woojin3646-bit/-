<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [overflow: scroll 과 white-space]
            1. 글자는 기본적으로 줄바꿈이 허용됩니다.
                
            2. 줄바꿈이 되면 가로로 넘치지 않기 때문에
                가로 스크롤은 의미가 없습니다.
            3. white-space: nowrap을 사용하면
                줄바꿈이 금지되어 가로 방향으로 넘치게 됩니다.              
        */

        .box {
            width: 200px;
            height: 200px;
            background-color: blueviolet;
            
            overflow: scroll; 
            white-space: normal;    /* 기본 값 - 줄바꿈 허용 */
        }

        .box2 {
            width: 200px;
            height: 200px;
            background-color: lightblue;

            overflow: scroll;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="box">
        줄바꿈이 허용되어 가로로 넘치지 않는다.
    </div>

    <div class="box2">
        줄바꿈이 금지되어 가로로 계속 이어지기 때문에 박스를 초과한다.
    </div>  
</body>
</html>
