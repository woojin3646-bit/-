<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [display: block]
            1. HTML의 기본 블록 요소와 인라인 요소는
                display 속성을 이용해 성격을 변경할 수 있습니다.
            2. 특히 인라인 요소에 width, height, margin을 적용하기 위해
                block 또는 inline-block으로 변경하는 경우가 많습니다.
            3. 이번 예제에서는 인라인 요소(span)를 block으로 변경해 차이를 확인합니다.
        */

        .before {
            background-color: aquamarine;
            height: 100px;          /* inline이라 적용되지 않음 */
            margin-top: 50px;       /* inline이라 상하 margin이 정상 적용되지 않음 */
            border: 2px solid black;
        }        
        .after {
            display: block;

            background-color: antiquewhite;
            height: 100px;      
            margin-top: 50px;   
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <span class="before">inline</span>
    <hr>
    <span class="after">block</span>
</body>
</html>
