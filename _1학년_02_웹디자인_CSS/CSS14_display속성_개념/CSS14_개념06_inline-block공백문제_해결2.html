<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [display: inline-block 공백 문제 해결2]
            1. 공백은 문자이기 때문에
                전체 글자 크기를 0으로 만들면
                공백도 보이지 않게 됩니다.
            2. 단, 자식 요소에서 필요에 따라 글자 크기를
                다시 지정해야 합니다.
        */
        
        * {
            /* 폰트 사이즈 제거 */
            font-size: 0;
        }
        .box {
            display: inline-block;
            /* 폰트 사이즈 재설정 */
            font-size: 12px;

            width: 100px;
            height: 100px;
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <div class="box">box1</div>
    <div class="box">box2</div>
    <div class="box">box3</div>
</body>
</html>
