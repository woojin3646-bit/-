<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [display: inline-block 베이스라인 문제]
            1. inline-block 요소는
                기본적으로 vertical-align: baseline 으로 정렬됩니다.
            2. baseline 이란
                텍스트가 앉는 기준선(글자 아래 보이지 않는 선)을 의미합니다.
            3. 요소 내부에 텍스트가 있는 경우
                해당 텍스트의 기준선을 따라 정렬됩니다.
            4. 요소 내부에 텍스트가 없는 경우
                박스 하단의 기준선처럼 취급됩니다.
            5. 따라서 텍스트가 있는 박스와
                텍스트가 없는 박스가 함께 있을 경우
                기준선 계산 방식이 달라져
                박스가 어긋나 보일 수 있습니다.
            6. 즉, inline-block은 블록처럼 크기를 가지지만
                정렬은 글자처럼 합니다.
        */

        * {
            /* 폰트 사이즈 제거 */
            font-size: 0;
        }
        .box {
            display: inline-block;
            /* 폰트 사이즈 재설정 */
            font-size: 12px;

            width: 100px;
            height: 100px;
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box">box2</div>
    <div class="box"></div>
</body>
</html>
