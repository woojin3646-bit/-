<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [flex 기본 개념]
            1. div는 기본적으로 block 요소입니다.
            2. 하지만 부모 요소에 display: flex를 적용하면
                부모는 flex 컨테이너가 됩니다.
            3. flex 컨테이너가 되면
                직계 자식들은 block / inline 여부와 관계없이
                flex item으로 동작합니다.
            4. flex item은 기본적으로 줄바꿈 없이 한 줄로
                가로 방향으로 배치됩니다.
            5. flex는 요소의 display 성질을 바꾸는 것이 아니라
                부모가 배치 방식을 새로 정의하는 것입니다.
            6. 때문에 부모에 display: flex를 적용합니다.
        */
        
        .parent { 
            display:flex; 
            
            border:1px solid black; 
            margin-bottom: 50px;
        }
        .box { 
            width:80px; 
            height:80px; 
            background:skyblue; 
            border:1px solid black; 
        }
        .text {
            background-color: antiquewhite;
            border: 1px solid black;
        }
    </style>    
</head>
<body>
    <div class="parent">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>    

    <div class="parent">
        <span class="text">test1</span>
        <span class="text">test2</span>
        <span class="text">test3</span>
    </div>  
</body>
</html>
