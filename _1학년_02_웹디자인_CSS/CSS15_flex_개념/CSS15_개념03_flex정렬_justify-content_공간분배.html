<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [flex 정렬: justify-content 공간 분배]
            1. justify-content는 주축(가로) 방향으로
                아이템 사이의 "남는 공간"을 어떻게 분배할 것인지 결정합니다.
            2. justify-content: space-between 
                - 첫 번째 아이템은 시작점에 붙고
                    마지막 아이템은 끝점에 붙습니다.
                - 아이템 "사이 간격"만 동일하게 분배됩니다.
                - 양쪽 끝에는 여백이 없습니다.
                - [시각적 구조]
                    |box1      box2      box3|
            3. justify-content: space-around
                - 각 아이템의 "양옆에 동일한 여백"이 생깁니다.
                - 결과적으로 아이템 사이 간격은
                    양쪽 끝 여백보다 2배가 됩니다.
                - [시각적 구조]
                    |  box1    box2    box3  |
                      ↑여백  ↑사이간격(2배)  ↑여백  
            4. justify-content: space-evenly
                - 모든 간격이 완전히 동일합니다.
                - 양쪽 끝 여백과 아이템 사이 간격이 모두 같습니다.
                - [시각적 구조]
                    |  box1   box2   box3  |
                        (모든 간격 동일)           
        */  
        
        .flex { 
            display:flex; 

            border:1px solid black; 
            height:120px;
            margin-bottom: 50px; 
        }
        .flex-space-between {
            /* 아이템끼리 최대한 거리 두기 */
            justify-content: space-between;
        }
        .flex-space-around {
            /* 아이템 양옆에 같은 여백 */
            justify-content: space-around;
        }
        .flex-space-evenly {
            /* 아이템 사이 여백 크기 일치 */
            justify-content: space-evenly;
        }                
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 
        }
    </style>    
</head>
<body>
    <div class="flex flex-space-between">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>  
    <div class="flex flex-space-around">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>           
    <div class="flex flex-space-evenly">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>   
</body>
</html>
