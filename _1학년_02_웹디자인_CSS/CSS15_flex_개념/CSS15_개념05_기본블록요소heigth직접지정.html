<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [기본 블럭 요소 - height 직접 지정]
            1. 부모에 height를 지정하면 부모는 고정 높이를 유지합니다.
            2. 자식에 height를 지정하면 자식도 고정 높이를 가집니다.
            3. 블록 요소에서는
                부모와 자식의 높이가 서로 영향을 주지 않습니다.
        */
        
        .parent {
            width: 300px;
            height: 300px;
            background-color: antiquewhite;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>
</body>
</html>
