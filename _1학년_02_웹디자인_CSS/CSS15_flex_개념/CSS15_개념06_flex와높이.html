<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [flex와 높이]
            1. 부모에 display: flex; 를 적용하면
                자식 요소들은 가로 방향으로 배치됩니다.
            2. 이때 부모에 height가 있고
                자식에 height가 지정되지 않으면
                자식은 부모 높이만큼 자동으로 늘어납니다.
            3. 따라서 각 박스는 가로 width: 100px,
                세로는 부모 높이(300px)를 따라갑니다.
        */

        .parent {
            display: flex;
            
            width: 300px;
            height: 300px;
            background-color: antiquewhite;
        }
        .box {
            width: 100px;
            background-color: aqua;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>
</body>
</html>
