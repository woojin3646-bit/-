<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [flex와 높이 - 자식 height 지정]
            1. 부모에 display: flex;와 height가 지정되어 있더라도,
                자식에 height를 직접 지정하면
            2. 자식은 부모 높이를 따라가지 않습니다.
            3. 부모는 300px 높이를 유지하고,
                자식은 지정한 100px 높이를 유지합니다.
            4. 즉,
                자식의 height가 auto일 대만
                부모 높이에 맞춰 자동으로 늘어납니다.
        */

        .parent {
            display: flex;
            
            width: 300px;
            height: 300px;
            background-color: antiquewhite;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: aqua;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>
</body>
</html>
