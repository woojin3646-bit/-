<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [flex 정렬: gap 기본 개념]
            1. gap은 자식 요소(플렉스 아이템) 사이의 
                "고정 간격"을 만드는 속성입니다.
            2. gap은 부모에 적용합니다.
            3. display: flex 또는 display: grid인 경우에만 사용할 수 있습니다.
            4. gap은 아이템 사이에만 적용되며
                양쪽 끝에는 영향을 주지 않습니다.
        */

        .flex {
            display: flex;

            border:1px solid black; 
            height:300px;
            margin-bottom: 50px;             
        }
        .justify-content {
            justify-content: center;
        }
        .align-items {
            align-items: center;
        }
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 
        }      
        .gap {
            gap: 30px;
        }  
    </style>
</head>
<body>
    <div class="flex justify-content align-items gap">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
