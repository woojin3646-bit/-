<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [grid 기본 개념]  
            1. display: grid; 는
                2차원(가로 + 세로) 레이아웃 시스템입니다.
            2. flex는 한 방향(1차원) 정렬에 강합니다.
                - 가로(row) 또는 세로(column) 중 하나를 기준으로 정렬
            3. grid는
                가로 줄(행, row)과 세로 줄(열, column)을
                동시에 설계할 수 있습니다.
            4. 현재 예제는 grid만 선언한 상태이며,
                행과 열을 아직 정의하지 않았기 때문에
                기본 배치로 자동 정렬됩니다.
        */
        
        .grid {
            display: grid;

            background-color: antiquewhite;
            height:500px;
        }        
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 
        }          
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
