<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [grid-template-columns: 고정px 2열]   
            1. 150px 150px  → 2열 생성
            2. 아이템이 4개라면
                첫 줄에 2개, 다음 줄에 2개가 배치됩니다.
            3. 열 개수를 줄이면 한 줄에 들어가는 아이템 개수도 줄어듭니다.
        */
        
        .grid {
            display: grid;
            grid-template-columns: 150px 150px;

            background-color: antiquewhite;
            height:500px;
        }        
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 

        }          
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
