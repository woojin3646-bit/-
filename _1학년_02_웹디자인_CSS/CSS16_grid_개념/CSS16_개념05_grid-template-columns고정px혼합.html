<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [grid-template-columns: 고정px 혼합]   
            1. 열마다 서로 다른 너비를 줄 수 있습니다.
                300px 150px 150px  → 3열 (첫 열만 넓음)
            2. 아이템이 5개면
                3개는 첫 줄, 2개는 다음 줄로 내려갑니다.
        */
        
        .grid {
            display: grid;
            grid-template-columns: 300px 150px 150px;

            background-color: antiquewhite;
            height:500px;
        }        
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 

        }          
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
