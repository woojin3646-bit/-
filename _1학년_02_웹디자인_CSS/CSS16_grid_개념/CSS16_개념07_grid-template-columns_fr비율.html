<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [grid-template-columns: fr 비율]   
            1. fr이 여러 개면 "남은 공간"을 비율로 나눕니다.
            2. 예) width: 1050px, 150px 2fr 1fr
                - 1050px 제외 남은 너비 = 900px
                - 2fr : 1fr = 2 : 1
                - 600px : 300px 로 분배됩니다.
        */
        
        .grid {
            display: grid;
            width: 1050px;
            grid-template-columns: 150px 2fr 1fr;

            background-color: antiquewhite;
            height:500px;
        }        
        .box { 
            width:80px; 
            height:80px; 
            background:chocolate; 
            border:1px solid black; 

        }          
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
