<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [grid-template-columns: repeat autofill]   
            1. auto-fill은
                지정한 크기로 "들어갈 수 있는 만큼" 열을 자동 생성합니다.
            2. 예) width: 500px
                   grid-template-columns: repeat(auto-fill, 150px)
                - 한 줄에 150px이 3개까지 들어갑니다. (450px)
                - 나머지는 다음 줄로 내려갑니다.
        */
        
        .grid {
            display: grid;
            width: 500px;
            grid-template-columns: repeat(auto-fill, 150px);

            background-color: antiquewhite;
            height:500px;
        }        
        .box { 
            width:100px; 
            height:100px; 
            background:chocolate; 
            border:1px solid black; 

        }          
    </style>
</head>
<body>
    <div class="grid">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
