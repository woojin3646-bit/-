<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [position: absolute 기준 만들기]
            1. absolute는 반드시 기준이 되는 요소를 기준으로 
                위치가 결정됩니다.
            2. 기준이 되는 요소는 보통
                가장 가까운 조상 중 position: relative; 가
                지정된 요소입니다.
            3. 자식 요소에 position: absolute; 를 적용하고
                top/left/right/bottom 으로
                기준 부모의 모서리로부터 위치를 지정합니다.
            4. 기준이 되는 부모가 없다면
                화면(body)을 기준으로 배치됩니다.
        */

        .parent {
            position: relative;

            width: 200px;
            height: 200px;
            background-color: antiquewhite;
        }
        .box {
            position: absolute;
            top: 40px;      /* 아래로 40px 이동 */
            left: 40px;     /* 오른쪽으로 40px 이동 */
            
            width: 80px;
            height: 80px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box"></div>
    </div>
</body>
</html>
