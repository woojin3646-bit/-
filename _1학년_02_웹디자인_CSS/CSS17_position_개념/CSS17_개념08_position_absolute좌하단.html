<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [position: absolute 좌하단]
        */

        .parent {
            position: relative;

            width: 200px;
            height: 200px;
            background-color: antiquewhite;
        }
        .box {
            position: absolute;
            bottom: 0;      
            left: 0;     
            
            width: 80px;
            height: 80px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box">
            bottom: 0; <br>     
            left: 0;               
        </div>
    </div>
</body>
</html>
