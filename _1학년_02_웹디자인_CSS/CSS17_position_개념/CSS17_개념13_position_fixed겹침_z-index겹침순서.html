<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [position: fiexed 겹침 z-index 겹침 순서]
            1. z-index는 겹치는 요소의 앞/뒤 순서를 결정합니다.
            2. 숫자가 클수록 위(앞)로 올라옵니다.

        */

        .fixed-a {
            position: fixed;
            left: 0;
            top: 0;

            width: 100px;
            height: 100px;
            background-color: blue;
            color: white;

            z-index: 2;
        }
        .fixed-b {
            position: fixed;
            top: 50px;
            left: 50px;

            width: 100px;
            height: 100px;
            background-color: red;
            color: white;

            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="fixed-a">A 사각형</div>
    <div class="fixed-b">B 사각형</div>
</body>
</html>
