<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [고정 폭(px)의 한계]
            1. width를 px로 고정하면,
                화면이 충분히 넓을 때는 문제가 없어 보입니다.
            2. 하지만 브라우저 폭이 요소의 width보다 작아지면,
                요소가 화면 밖으로 튀어나가면서 가로 스크롤이 생깁니다.
            3. 따라서 고정 폭(px)만으로 레이아웃을 만들기보다,
                다음 방식을 더 자주 사용됩니다.
                - width: 100% + max-with
                - min-width / max-width 로 범위를 제한
        */

        .box {
            width: 1000px;
            background-color: antiquewhite;
            border: 1px solid #999;
        }
    </style>
</head>
<body>
    <h3>브라우저 폭을 줄이면 가로 스크롤이 생깁니다.</h3>
    <div class="box">
        width를 px로 고정하면, 면이 충분히 넓을 때는 문제가 없어 보입니다.
        하지만 브라우저 폭이 요소의 width보다 작아지면, 요소가 화면 밖으로 튀어나가면서 가로 스크롤이 생깁니다.
    </div>
</body>
</html>
