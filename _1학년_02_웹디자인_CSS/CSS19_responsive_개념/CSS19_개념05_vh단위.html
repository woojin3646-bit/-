<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [vh 단위]
            1. vh는 viewport height의 약자입니다.
            2. 뷰포트(viewport) 는
                지금 내가 보고 있는 브라우저 화면의 보이는 영역을 의미합니다.
            3. 1vh = 화면 높이의 1%
            4. 부모 height 설정이 없어도 동작합니다.
        */

        .box {
            height: 50vh;
            background-color: bisque;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
