<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [퍼센트 단위]
            1. % 단위는 부모 요소의 크기를 기준으로 합니다.
            2. 부모 height가 반드시 지정되어 있어야 합니다.
        */

        .parent {
            height: 400px;
            background-color: blue;
            color: white;
        }
        .child {
            height: 50%;
            background-color: lightblue;
        }

        .parent2 {
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <h3>부모 height 있음</h3>
    <div class="parent">
        <div class="child"></div>
    </div>

    <h3>부모 height 없음</h3>
    <div class="parent2">
        <div class="child"></div>
    </div>    
</body>
</html>
