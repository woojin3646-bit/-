<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [percent와 vh 단위 비교]
            1. % 단위
                - 부모 요소의 크기를 기준으로 합니다.
                - 부모에 height가 명확히 지정되어 있어야 의도대로 동작합니다.
            2. vh 단위
                - 브라우저 화면 높이 기준입니다.
                - 부모 height 설정 없이도 동작합니다.
                - 1vh = 화면 높이의 1%
        */

        .vhWrap {
            height: 50vh;
            background-color: blue;
            border: 1px solid #999;
        }
        .vhChild {
            height: 50%;
            background-color: lightblue;
        }

        .parentWrap {
            background-color: blue;
            border: 1px solid #999;
        }
        .parentChild {
            height: 50%;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h3>vh는 화면 기준</h3>
    <div class="vhWrap">
        <div class="vhChild">
            부모가 50vh라서 height:50%가 동작합니다.
        </div>
    </div>

    <h3>%는 부모 기준 (부모 height 없음)</h3>
    <div class="percentWrap">
        <div class="percentChild">
            부모 height가 없으면 의도대로 동작하지 않을 수 있습니다.
        </div>
    </div>    
</body>
</html>
