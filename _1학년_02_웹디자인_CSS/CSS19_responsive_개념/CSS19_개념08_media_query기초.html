<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [Media Query 기초]
            1. Media Query란?
                - 화면 크기(해상도)에 따라
                    다른 CSs를 적용하는 기능입니다.
            2. 기본 구조
                @media screen and (조건) {
                    선택자 {
                        속성: 값;
                    }
                }
            3. 자주 사용하는 조건
                (1) max-width: 700px;
                    - 700px 이하일 때 적용
                (2) min-width: 900px;
                    - 900px 이상일 때 적용
            4. CSS 적용 우선순위
                - 기본 스타일이 먼저 적용됩니다.
                - 조건을 만족하면
                    media query 내부 스타일이 덮어씌워집니다.
        */

        .responsive-bg {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;

            /* 
                [기본 값]
                - 태블릿 기준
                - media query 밖에 있는 기본 스타일
                - 700초과 ~ 900미만
             */
            background-color: red;
        }

        /* 
            [PC]
            - 최소 너비가 900px 
            - 즉, 900px 이상일 때 적용
         */
        @media screen and (min-width: 900px) {
            .responsive-bg {
                background-color: blue;
            }
        }

        /* 
            [모바일]
            - 최대 너비가 700px
            - 즉, 700px 이하일 때 적용
        */
        @media screen and (max-width: 700px) {
            .responsive-bg {
                background-color: yellow;
                color: black;
            }
        }
    </style>
</head>
<body>
    <div class="responsive-bg">
        화면 크기를 조절해보세요
    </div>
</body>
</html>
