<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
            [Media Query 오류]
            - 기본 선택자가 @media 쿼리보다 아래에 있으면,
                정상적으로 동작하지 않습니다.
        */

        @media screen and (min-width: 900px) {
            .responsive-bg {
                background-color: blue;
            }
        }
        @media screen and (max-width: 700px) {
            .responsive-bg {
                background-color: yellow;
                color: black;
            }
        }
        
        .responsive-bg {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            background-color: red;
        }        
    </style>
</head>
<body>
    <div class="responsive-bg">
        화면 크기를 조절해보세요
    </div>
</body>
</html>
