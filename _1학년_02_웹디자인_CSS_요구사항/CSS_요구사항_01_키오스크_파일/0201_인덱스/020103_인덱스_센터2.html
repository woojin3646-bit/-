<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>맥도날드</title>
    <link rel="icon" href="img/favicon.png" tyep="image/png">    
    <style>
        /* 공통 */
        * {
            margin: 0 auto;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
        }      

        /* center2 */
        .div-center2 {
            text-align: center;
            color: #fff;  
            width: 800px;
            height: 600px;
            background-color: #007000;            
        }
        .img-center2 {
            height: 300px;
        }
        .tr-center2 {
            height: 500px;
        }
        .td-center2 {
            width: 350px;
            border-radius: 25px;
            background-color: #fff;
            font-size: 35px;
            font-weight: bold;
            color: #EE6A7B;
        }
        .td-center2:hover {
            color: #fff;
            font-weight: bold;
            background-color: #ffb700;
        }        
        .td-center2-gap {
            width: 25px;
        }
    </style>
</head>
<body>

    <div class="div-center2">
        <table class="table-center2">
            <tr class="tr-center2">
                <td class="td-center2">
                    <a href="#"><img class="img-center2" src="img/admin.png"></a>
                    <br><br>
                    관리자
                </td>
                <td class="td-center2-gap"></td>
                <td class="td-center2">
                    <a href="#"><img class="img-center2" src="img/user.png"></a>
                    <br><br>
                    사용자
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
