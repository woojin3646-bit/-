<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>맥도날드</title>
    <link rel="icon" href="img/favicon.png" tyep="image/png">    
    <style>
        /* 공통 */
        * {
            margin: 0 auto;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
        } 

        /* result */
        .div-result {
            width: 800px;
            height: 150px;
        }
        .tr-result {
            height: 100px;
        }
        .td-result-img {
            width: 100px;
        }
        .td-result-price {
            width: 300px;
            font-size: 30px;
            font-weight: bold;
        }
        .td-result {
            width: 500px;
        }
        .img-result {
            width: 50px;
        }
        .btn-submit {
            font-size: 20px;
            width: 500px;
            height: 55px;
            border: 1px solid #999;
            border-radius: 3.5px; 
            cursor: pointer;           
        }
        .btn-submit:hover {
            background-color: #ffd500fd;
            color: #007000;
        }  
        .hr-result {
            height: 0.5px;
            background-color: #999;
            border-style: none;
        }
    </style>
</head>
<body>

     <div class="div-result">
        <table>
            <tr>
                <td colspan="3"><hr class="hr-result"></td>
            </tr>
            <tr class="tr-result">
                <td class="td-result-img"><img class="img-result" src="img/cart.png"></td>
                <td class="td-result-price">￦ 7,800</td>
                <td class="td-result"><button class="btn-submit" onclick="location.href='cart.html'">주문 내역 확인 후 결제하기</button></td>
            </tr>
        </table>
    </div>
    
</body>
</html>
