<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>맥도날드</title>
    <link rel="icon" href="img/favicon.png" tyep="image/png">    
    <style>
        /* 공통 */
        * {
            margin: 0 auto;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
        } 

        /* center */
        .div-center {
            width: 800px;
            height: 700px;
        }   
        .img-center {
            width: 150px;
        }        
        .tr-center {
            height: 150px;
            border-top: 1px solid #999;
        }
        .td-center-number {
            width: 50px;
        }
        .td-center-img {
            width: 200px;
        }
        .td-center-title {
            width: 300px;
        }        
        .td-center-count {
            width: 50px;
        }
        .td-center-price {
            width: 100px;
        }
        .td-center-btn {
            width: 100px;
        }
        .btn-center {
            width: 100px;
            height: 35px;
            border: 1px solid #999;
            border-radius: 3.5px; 
            cursor: pointer;   
            background-color: #fff;           
        }
        .btn-center:hover {
            background-color: #ffd500fd;
            color: #007000;            
        }
    </style>
</head>
<body>

    <div class="div-center">
        <table>
            <tr class="tr-center">
                <td class="td-center-number">1</td>
                <td class="td-center-img"><img class="img-center" src="img/01.png"></td>
                <td class="td-center-title">맥크리스피 디럭스 버거</td>
                <td class="td-center-count">1</td>
                <td class="td-center-price">￦ 8,600</td>
                <td class="td-center-btn"><button class="btn-center">취소</button></td>
            </tr>            
            <tr class="tr-center">
                <td class="td-center-number">2</td>
                <td class="td-center-img"><img class="img-center" src="img/06.png"></td>
                <td class="td-center-title">빅맥</td>
                <td class="td-center-count">2</td>
                <td class="td-center-price">￦ 16,000</td>
                <td class="td-center-btn"><button class="btn-center">취소</button></td>
            </tr>  
            <tr class="tr-center">
                <td class="td-center-number">3</td>
                <td class="td-center-img"><img class="img-center" src="img/10.png"></td>
                <td class="td-center-title">코카콜라</td>
                <td class="td-center-count">1</td>
                <td class="td-center-price">￦ 3,600</td>
                <td class="td-center-btn"><button class="btn-center">취소</button></td>
            </tr>                          
        </table>
    </div>

</body>
</html>
