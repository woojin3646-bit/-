<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맥도날드</title>
    <link rel="icon" href="img/favicon.png" tyep="image/png">       
    <style>
        /* 공통 */
        * {
            margin: 0 auto;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
        }  
        
        /* header */
        .div-header {
            text-align: center;
            width: 800px;
            height: 250px;
            background-color: #007000;  
        }   
        .tr-header {
            height: 200px;
        } 
        .td-header-menu {
            text-align: right;
        }
        .td-header-content {
            width: 600px;
            text-align: left;
        }
        .td-header-item {
            width: 200px;
            text-align: center;
        }
        .img-home {
            width: 35px;
        }
        .img-home:hover {
            cursor: pointer;
        }
        .img-header {
            width: 120px;
        }        
        .span-main {
            font-size: 28px;
            color: #fff;  
        }    
        .span-sub {
            font-size: 20px;
            color: #999;   
        }   
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="div-header">
        <br>
        <table>
            <tr>
                <td class="td-header-menu" colspan="2">
                    <a href="index.html">
                        <img class="img-home" src="img/home.png">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    </a>
                </td>
            </tr>
            <tr class="tr-header">
                <td class="td-header-item">
                    <a href="index.html">
                        <img class="img-header" src="img/logo.png">
                    </a>
                </td>
                <td class="td-header-content">
                    <span class="span-main">관리자 페이지</span>
                    <br>
                    <span class="span-sub">Admin Dashboard</span>
                </td>
            </tr>
        </table>
    </div>    

</body>
</html>
