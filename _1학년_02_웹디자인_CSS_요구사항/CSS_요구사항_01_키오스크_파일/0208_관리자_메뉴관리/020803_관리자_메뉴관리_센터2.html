        * {

        table {

            border-collapse: collapse;
        }  

        /* center2 */
        .div-center {
            text-align: center;
            width: 800px;
            height: 1000px;
            background-color: #fdffea;            
        }   
        .img-center {
            width: 120px;
            border-radius: 10px;
        }  
        .img-center-delete {
            width: 30px;
        } 
        .table-center {
            font-size: 16px;
            color: #333;
        }
        .tr-center-header {
            border-top: 1px solid #999;
            border-bottom: 1px solid #999;
            height: 50px;
        }
        .tr-center {
            height: 130px;
        }        
        .th-center {
            width: 130px;
            text-align: center;
            border-bottom: 1px solid #999;
            background-color: #efeeee;
        }     
        .th-center-number {
            width: 50px;
            text-align: center;
            background-color: #efeeee;
        }         
        .td-center {

        }        
        .span-item {
            font-size: 20px;
            font-weight: bold;
            color: #007000;
        }
        .span-content {
            font-size: 28px;
            color: #333;             
        }
        .btn-plus {
            width: 40px;
            height: 30px;
            border-radius: 20px;
            border: 1px solid #999;
            cursor: pointer;
        }
        .btn-minus {
            width: 40px;
            height: 30px;
            border-radius: 20px;
            border: 1px solid #999;
            cursor: pointer;
        }     
        .btn-plus:hover {
            background-color: #ffd500fd;
        }
        .btn-minus:hover {
            background-color: #ffd500fd;
        }
        a {
            color: #333;
            text-decoration: none;
        }
        a:hover {
            color: #007000;
            text-decoration: underline;
        }        
    </style>
</head>
