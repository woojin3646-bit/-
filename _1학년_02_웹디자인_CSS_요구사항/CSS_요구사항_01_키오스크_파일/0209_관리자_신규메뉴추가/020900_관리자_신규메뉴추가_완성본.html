<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맥도날드</title>
    <link rel="icon" href="img/favicon.png" tyep="image/png">       
    <style>
        /* 공통 */
        * {
            margin: 0 auto;
        }
        table {
            margin-left: auto;
            margin-right: auto;
            border-collapse: collapse;
        }  
        
        /* header */
        .div-header {
            text-align: center;
            width: 800px;
            height: 250px;
            background-color: #007000;  
        }   
        .tr-header {
            height: 200px;
        } 
        .td-header-menu {
            text-align: right;
        }
        .td-header-content {
            width: 600px;
            text-align: left;
        }
        .td-header-item {
            width: 200px;
            text-align: center;
        }
        .img-home {
            width: 35px;
        }
        .img-home:hover {
            cursor: pointer;
        }
        .img-header {
            width: 120px;
        }        
        .span-main {
            font-size: 28px;
            color: #fff;  
        }    
        .span-sub {
            font-size: 20px;
            color: #999;   
        }   
        a {
            text-decoration: none;
        }

        /* center1 */
        .div-nav {
            width: 800px;
            height: 80px;
        }
        .tr-nav {
            height: 80px;
        }
        .td-nav {
            width: 200px;
            text-align: center;
            background-color: #fdffea; 
        }
        a {
            color: #333;
            text-decoration: none;
        }
        a:hover {
            color: #007000;
            text-decoration: underline;
        }  
        
        /* center2 */
        .div-center {
            text-align: center;
            width: 800px;
            height: 1000px;
            background-color: #fdffea;            
        }   
        .tr-center {
            border: 1px solid #999;
            height: 60px;
        }
        .th-center {
            border: 1px solid #999;
            width: 100px;
            background-color: #efeeee;
        }
        .td-center {
            border: 1px solid #999;
            width: 250px;
        }
        .span-item {
            font-size: 20px;
            font-weight: bold;
            color: #007000;
        }
        .span-content {
            font-size: 28px;
            color: #333;             
        }
        .input-center {
            width: 200px;
            height: 40px;
            border: 1px solid #999;
            border-radius: 3.5px;
            padding-left: 15px;            
        }  
        .btn-submit {
            font-size: 16px;
            width: 350px;
            height: 55px;
            border: 1px solid #999;
            border-radius: 3.5px; 
            cursor: pointer;           
        }
        .btn-submit:hover {
            background-color: #ffd500fd;
            color: #007000;
        }       
        
        /* footer */
        .div-footer {
            text-align: center;
            color: #fff;              
            width: 800px;
            height: 120px;
            background-color: #007000;               
        }
        .span-bold {
            font-weight: bold;
            color: #ffd500fd;
        }           
    </style>
</head>
<body>
    <!-- 관리자_신규메뉴추가_헤더 -->
    <div class="div-header">
        <br>
        <table>
            <tr>
                <td class="td-header-menu" colspan="2">
                    <a href="index.html">
                        <img class="img-home" src="img/home.png">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    </a>
                </td>
            </tr>
            <tr class="tr-header">
                <td class="td-header-item">
                    <a href="index.html">
                        <img class="img-header" src="img/logo.png">
                    </a>
                </td>
                <td class="td-header-content">
                    <span class="span-main">관리자 페이지</span>
                    <br>
                    <span class="span-sub">Admin Dashboard</span>
                </td>
            </tr>
        </table>
    </div>    

    <!-- 관리자_신규메뉴추가_센터1 -->
    <div class="div-nav">
        <table>
            <tr class="tr-nav">
                <td class="td-nav"><a href="adminIndex.html">관리자메인</a></td>
                <td class="td-nav"><a href="adminMenu.html">전체상품관리</a></td>
                <td class="td-nav"><a href="adminTestAddResult.html">샘플메뉴추가</a></td>
                <td class="td-nav"><a href="adminMenuAddForm.html">신규메뉴추가</a></td>
                <td class="td-nav"><a href="adminResetResult.html">초기화</a></td>
            </tr>          
        </table>       
    </div>  
    
    <!-- 관리자_신규메뉴추가_센터2 -->    
    <div class="div-center">
        <br><br><br>
        <span class="span-content">신규 메뉴 추가</span>
        <br>
        <span class="span-sub">Add New Menu</span>
        <br><br><br><br>
        <table class="table-center">
            <tr class="tr-center">
                <th class="th-center">상품이름</th>
                <td class="td-center">
                    <input class="input-center" type="text">
                </td>
            </tr>      
            <tr class="tr-center">
                <th class="th-center">상품가격</th>
                <td class="td-center">
                    <input class="input-center" type="text">
                </td>
            </tr>    
            <tr class="tr-center">
                <th class="th-center">상품개수</th>
                <td class="td-center">
                    <input class="input-center" type="text">
                </td>
            </tr>          
            <tr class="tr-center">
                <th class="th-center">이미지</th>
                <td class="td-center">
                    <input class="input-center" type="text">
                </td>
            </tr>    
        </table>
    
        <br>
    
        <button class="btn-submit" onclick="location.href='adminMenuAddFormResult.html'">추가하기</button>
    </div>

    <!-- 관리자_신규메뉴추가_풋터 -->
    <div class="div-footer">
        <br>
        <span class="span-bold">Order Management System</span>
        <br>
        Designed and developed as part of a student portfolio project.
        <br>
        Copyright &copy; 2025 All rights reserved. Created by <span class="span-bold">Hong Guil Dong</span>.
    </div>    
</body>
</html>
