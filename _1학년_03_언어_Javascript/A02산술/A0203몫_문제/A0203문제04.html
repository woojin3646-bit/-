<script>
    /*
        [문제]
        다음은 나누기 연산을 사용하여 몫을 구하는 계산식입니다.
        모든 식을 계산한 후, 몫이 가장 큰 값의 번호를 예측하시오.

        [보기]
        (1) Math.floor(750 / 9)
        (2) Math.floor(170 / 2)
        (3) Math.floor(230 / 3)
        (4) Math.floor(634 / 8)
    */

  document.writeln(Math.floor(750 / 9)) 
  document.writeln(Math.floor(170 / 2)) 
  document.writeln(Math.floor(230 / 3)) 
  document.writeln(Math.floor(634 / 8)) 
  // 2>1>4>3
</script>
