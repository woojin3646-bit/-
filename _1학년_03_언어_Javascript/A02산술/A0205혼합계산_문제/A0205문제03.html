<script>
    /*
        [문제]
        다음 보기는 혼합 계산식입니다.
        주어진 데이터를 사용하여 연산의 결과를 출력하는 코드를 작성하고, 각 연산의 결과를 예측하시오.

        [보기]
    document.writeln    (12 + -2 * 4)
    document.writeln    (-3 - 3 * -2)
   document.writeln    ( 9 + -8 / 4)
   document.writeln    ( -5 - 6 / 2)
  document.writeln    (  8 + 9 % 4)
   document.writeln    ( -2 - 3 % 6)
    */
document.writeln((12 + -2 * 4) + "<br>");
document.writeln((-3 - 3 * -2) + "<br>");
document.writeln((9 + -8 / 4) + "<br>");
document.writeln((-5 - 6 / 2) + "<br>");
document.writeln((8 + 9 % 4) + "<br>");
document.writeln((-2 - 3 % 6) + "<br>");
//4 3 7 -8 9 -5 
</script>
