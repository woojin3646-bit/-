<script>
    /*
        [문제]
        6453의 백의 자리를 0으로 변경하시오.
    */

    /*
        [출력예시]
        6053        
    */

   let a = 6453;
   let b = Math.floor(a/1000) * 1000;
   let c = Math.floor(a%100);
   document.writeln(b+c);
   // 그럼만약에 60453이면 

   let a = 60453;
   let b = Math.floor(a/10000) * 10000;
   let c = Math.floor(a/1000);
   let d = Math.floor(a/100);
   document.writeln(b+c+d); 


</script>
