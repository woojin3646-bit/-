<script>
    /*
        [문제]
        철수는 주사위 게임을 하고 있습니다. 
        이 게임에서 두 개의 주사위를 사용합니다. 
        첫 번째 주사위는 -3에서 2까지의 숫자가 적혀 있고, 두 번째 주사위는 1에서 6까지의 숫자가 적혀 있습니다. 
        두 주사위를 던져서 각각의 숫자와 그 곱을 출력하시오.        
    */

    /*
        [출력예시]
        -2
        2
        -4
    */

    let a = Math.floor(Math.random() * 6) - 3;
    let b = Math.floor(Math.random() * 6) + 1;
    let c = a * b;

    document.write(a + "<br>");
    document.write(b + "<br>");
    document.write(c + "<br>");
</script>
