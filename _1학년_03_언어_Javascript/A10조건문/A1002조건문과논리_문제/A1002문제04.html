<script>

    /*
        [문제]
        10000부터 90000 사이의 랜덤 숫자를 저장한 후, 
        숫자의 첫 번째 자리와 마지막 자리의 숫자를 더한 값을 구하시오. 
        그 합이 짝수이면 "짝수"를 출력하고, 홀수이면 "홀수"를 출력하는 프로그램을 작성하시오.    
    */
    
    /*
        [출력예시]
        72116
        7 6
        13
        홀수   
    */
    let a = Math.floor(Math.floor()*90000)+10000;

    let b = Math.floor( a / 10000 ) % 10 ; 
    let f = Math.floor( a % 10 ) ; 

    let result = ( b + f );

  if ( result % 2 == 0) {
    document.writeln("짝수");
  } else {
    document.writeln("홀수");
  }
   
</script>
