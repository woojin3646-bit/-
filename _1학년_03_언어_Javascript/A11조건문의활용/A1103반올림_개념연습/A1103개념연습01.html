<script>

    /*
        [문제]
        10에서 99 사이의 랜덤 숫자를 저장한 후 일의 자리에서 반올림을 하시오.
    */
    
    /*
        [출력예시]
        73
        70

        [출력예시]
        37
        40  
    */
    
    let r = Math.floor(Math.random() * 90) + 10;
    document.write(r, "<br>");

    let a = Math.floor(r / 10);
    let b = r % 10;

    if(b >= 5) {
        a = a + 1;
    }

    let c = a * 10;
    document.write(c);
</script>
