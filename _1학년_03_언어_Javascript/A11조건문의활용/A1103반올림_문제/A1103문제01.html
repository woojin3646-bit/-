<script>

    /*
        [문제]
        10에서 99 사이의 랜덤 숫자를 저장한 후 일의 자리에서 반올림을 하시오.
    */
    
    /*
        [출력예시]
        73
        70

        [출력예시]
        37
        40  
    */

let a = Math.floor(Math.random() * 90) + 10;

document.writeln(a);

let result = Math.round(a / 10) * 10;

document.writeln(result);
     
    
</script>
