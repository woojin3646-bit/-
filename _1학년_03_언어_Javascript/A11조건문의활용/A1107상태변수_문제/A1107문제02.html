<script>

    /*
        [문제]
        a = 10
        b = 20
        c = 30

        랜덤 숫자 1 또는 2를 저장합니다.
        1이 나오면 a와 b의 값을 교환하고,
        2가 나오면 a와 c의 값을 교환한 후 출력하시오.    
    */
    
    /*
        [출력예시]
        1
        20 10 30

        [출력예시]
        2
        30 20 10    
    */

    let a = 10;
    let b = 20;
    let c = 30;

let state = Math.floor(Math.random()*2)+1;
if( state == 1 ){
    let temp = a
    a = b
    b = temp
}
if( state == 2 ){
   let temp = a
    a = c
    c = temp
}

</script>
