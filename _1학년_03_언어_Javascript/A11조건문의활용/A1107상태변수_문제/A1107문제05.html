<script>

    /*
        [문제]
        이해를 돕기 위해 player1은 상대편을, player2는 자신을 뜻합니다.

        player1와 player2는 1에서 3 사이의 숫자를 랜덤으로 저장합니다.
        가위, 바위, 보를 1, 2, 3 숫자로 각각 표현합니다.
        player1과 player2를 비교하여, player2를 기준으로 "비김", "승리", "패배"를 출력하시오.    
    */
    
    /*
        [출력예시]
        player1 바위
        player2 보
        승리 
    */
   
let player1 = Math.floor(Math.random()*3)+1;
let player2 = Math.floor(Math.random()*3)+1;

let p1 = ""
  if( player1 == 1 ){
    p1 = "가위"
  }
    if( player1 == 2 ){
    p1 = "바위"
  }
    if( player1 == 3 ){
    p1 = "보"
  }
let p2 =""
  if( player2 == 1 ){
    p2 = "가위"
  }
    if( player2 == 2 ){
    p2 = "바위"
  }
    if( player2 == 3 ){
    p2 = "보"
  }
document.writeln("플레이어 1", " ", p1," ", "플레이어 2"," ",p2)
if(p1 == p2){
    document.writeln("비김")
}else if( p1 > p2){
    document.writeln("이김")
}else if( p1 < p2){
    document.writeln("짐")
}
</script>
