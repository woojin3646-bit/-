<script>

    /*
        [문제]
        1부터 5 사이의 랜덤 숫자를 저장합니다.
        1이면 "아메리카노", 2이면 "카페라떼", 3이면 "모카라떼",
        그 외 숫자는 "주문취소"를 출력하시오.    
    */
    
    /*
        [출력예시]
        2
        까페라떼

        [출력예시]
        5
        주문취소    
    */
    
   let a = Math.floor(Math.random()*5)+1;
   if ( a == 1){
    document.writeln("아메리카노");
   }else if ( a == 2 ){
    document.writeln("카페라떼");
   }else if ( a == 3 ){
    document.writeln("모카라떼");
   }else{
    document.writeln("주문취소");
   }
</script>
