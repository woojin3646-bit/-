<script>

    /*
        [문제]
        1부터 99 사이의 랜덤 숫자를 생성하여 저장합니다.
        생성된 숫자를 각 자리별로 나눈 후, 숫자 3, 6, 9의 개수를 확인합니다.

        [조건]
        (1) 3, 6, 9의 개수가 2개이면, "짝짝"을 출력합니다.
        (2) 3, 6, 9의 개수가 1개이면, "짝"을 출력합니다.
        (3) 3, 6, 9의 개수가 0개이면, 해당 숫자를 그대로 출력합니다.    
    */
    
    /*
        [출력예시] 
        33
        2
        짝짝    
    */

let dice = Math.floor(Math.random()*900)+100;

let a = Math.floor(dice / 100)   // 백의 자리
let b = Math.floor(dice / 10) % 10  // 십의 자리
let c = dice % 10;              // 일의 자리

let count = 0;

if (a % 2 == 0){
    count += 1
}else if( b % 2 == 0){
    count += 1 
}else if( c % 2 == 0){
    count += 1
}

if(count=3){
    document.writeln("개쌤")
}else if(count=2){
    document.writeln("최강")
}else if(count=1){
    document.writeln("보통")
}else{
    document.writeln("약함")
}



</script>
