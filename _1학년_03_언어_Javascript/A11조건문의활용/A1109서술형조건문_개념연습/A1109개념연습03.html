<script>

    /*
        [문제]
        시험점수의 평균이 60점 이상이면 합격입니다.
        단, 한과목이라도 50점미만이면 과락입니다.     
        0에서 100 사이의 랜덤 숫자 두개를 시험 점수로 저장하고, 그 결과를 출력하시오.
    */
    
    /*
        [출력예시]
        63 87
        75
        합격

        [출력예시]
        49 88
        68.5
        불합격   
    */
    
    let r1 = Math.floor(Math.random() * 101);
    let r2 = Math.floor(Math.random() * 101);
    document.write(r1, " ", r2, "<br>");

    let a = r1 + r2;
    let b = a / 2;
    document.write(b, "<br>");

    let c = b >= 60;
    let d = r1 >= 50 && r2 >= 50;
    let e = c && d;

    if(e) {
        document.write("합격");
    }
    if(!e) {
        document.write("불합격");
    }
    
</script>
