<script>

    /*
        [문제]
        0에서 100 사이의 랜덤 숫자를 시험 점수로 저장합니다.
        시험 점수가 100부터 91이면 A학점, 90부터 81이면 B학점, 80 이하는 "재시험"입니다.
        만점이거나, A학점과 B학점의 일의 자리가 8점 이상이면 + 기호를 추가하시오.    
    */
    
    /*
        [출력예시]
        99
        A+

        [출력예시]
        53
        재시험    
    */
    
    let score = Math.floor(Math.random()*101);

    let a = score % 10 ;

    if ( score >= 91 ){
        s = "A학점" 
    }else if ( score >= 81){
        s = "B학점"
    }else{
        s = "재시험" 
    }
    if( s != "재시험" &&  ( a >= 8 || score == 100)){
        s+="+";
    }

    document.writeln(s);
</script>
