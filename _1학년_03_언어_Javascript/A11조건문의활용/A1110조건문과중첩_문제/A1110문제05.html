<script>

    /*
        [문제]
        100부터 999 사이의 랜덤 숫자를 저장하고,
        각 자리수가 20의 약수인 누적을 구하시오.     
    */
    
    /*
        [출력예시]
        572
        7    
    */
    
 let a = Math.floor(Math.random()*900)+100;
 let x = Math.floor( a / 100 );
 let y = Math.floor( a / 10 ) % 10;
 let z = a % 10 ;
   document.writeln( x , y , z  );

 if(20 % x == 0 && 20 % y == 0 && 20 % z == 0){
    document.writeln( x + y + z );
 }

</script>
