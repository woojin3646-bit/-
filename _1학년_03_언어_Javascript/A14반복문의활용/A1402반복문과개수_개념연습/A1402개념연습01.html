<script>
    /*
        [문제]
        반복문을 사용하여 24의 약수를 찾고,
        그 개수를 출력하시오.
    */
    /*
        [출력예시]
        1 2 3 4 6 8 12 24 
        8
    */
    
    let count = 0;
    let num = 24;
    for(let i = 1; i < 25; i++){
        if(num % i == 0){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    document.write(count);
</script>
