<script>
    /*
        [문제]
        반복문을 사용하여 2000의 약수를 찾고,
        그 중 백의 자리가 4인 약수를 모두 출력한 후, 
        그 개수도 출력하시오.
    */
    /*
        [출력예시]
        400
        1
    */
    
    let count = 0;
    let num = 2000;
    for(let i = 1; i< 2001; i++){
        let a = parseInt(i % 1000 / 100);
        let check1 = a == 4;
        let check2 = num % i == 0;
        if(check1 && check2){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    document.write(count)
</script>
