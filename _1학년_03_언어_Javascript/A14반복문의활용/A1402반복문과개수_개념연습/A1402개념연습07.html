<script>
    /*
        [문제]
        반복문을 사용하여 100부터 200까지의 숫자 중에서,
        십의 자리가 2이고 짝수인 숫자의 개수를 출력하시오.
    */
    /*
        [출력예시]
        120 122 124 126 128 
        5
    */

    let count = 0;
    for(let i = 100; i < 201; i++){
        let a = parseInt(i % 100 / 10);
        let check1 = i % 2 == 0;
        let check2 = a == 2;
        if(check1 && check2){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    document.write(count);

</script>
