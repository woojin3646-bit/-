<script>
    /*
        [문제]
        반복문을 사용하여 10부터 50까지의 숫자 중에서,
        십의 자리가 짝수이고, 일의 자리가 홀수인 동시에
        3의 배수인 숫자의 개수를 출력하시오.
    */
    /*
        [출력예시]
        21 27 45 
        3
    */
   let count = 0;
   for(let i = 10; i < 51; i++){
        let a = parseInt(i / 10);
        let b = i % 10;
        let check1 = a % 2 == 0 && b % 2 == 1;
        let check2 = i % 3 == 0;
        if(check1 && check2){
            document.write(i + " ");
            count += 1;
        }
   }
   document.write("<br/>");
   document.write(count);
    
</script>
