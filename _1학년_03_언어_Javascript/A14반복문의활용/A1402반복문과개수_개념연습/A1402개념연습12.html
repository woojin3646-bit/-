<script>
    /*
        [문제]
        반복문을 사용하여 100부터 900까지의 숫자 중, 
        백의 자리는 3의 배수, 십의 자리는 4의 배수, 일의 자리는 5의 배수인 숫자를 찾고, 출력하시오.
        또한 위 조건의 숫자들의 개수를 출력하시오.
        단, 각자리수가 0이면 제외합니다.
    */
    /*
        [출력예시]
        345 385 645 685 
        4
    */
    
    let count = 0;
    for(let i = 100; i < 901; i++){
        let a = parseInt(i / 100);
        let b = parseInt(i % 100 / 10);
        let c = i % 10;
        let check1 = a % 3 == 0 && b % 4 == 0 && c % 5 == 0;
        let check2 = a != 0 && b != 0 && c != 0;
        if(check1 && check2){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    document.write(count);
</script>
