<script>
    /*
        [문제]
        10에서 100 사이의 랜덤 숫자를 저장한 후,
        그 숫자의 약수 개수가 4이면 "당첨", 그렇지 않으면 "꽝"을 출력하시오.
    */
    /*
        [출력예시]
        15
        1 3 5 15
        당첨

        [출력예시]
        20
        1 2 4 5 10 20
        꽝
    */

    let r = Math.floor(Math.random() * 91) + 10;
    document.write(r + "<br/>");
    let count = 0;
    for(let i = 1; i < r + 1; i++){
        if(r % i == 0){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    document.write(count);
    
</script>
