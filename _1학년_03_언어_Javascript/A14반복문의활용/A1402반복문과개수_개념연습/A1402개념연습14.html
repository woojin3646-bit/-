<script>
    /*
        [문제]
        10에서 200 사이의 랜덤 숫자를 저장한 후,
        그 숫자의 약수 중 홀수의 개수가 4이면 "당첨", 그렇지 않으면 "꽝"을 출력하시오.
    */
    /*
        [출력예시]
        141
        1 3 47 141
        당첨

        [출력예시]
        32
        1
        꽝
    */

    let r = Math.floor(Math.random() * 191) + 10;
    document.write(r + "<br/>");
    let count = 0;
    for(let i = 1; i < r + 1; i++){
        let check1 = r % i == 0;
        let check2 = i % 2 == 1;
        if(check1 && check2){
            document.write(i + " ");
            count += 1;
        }
    }
    document.write("<br/>");
    if(count == 4){
        document.write("당첨");
    }else{
        document.write("꽝");
    }
</script>
