<script>
    /*
	[문제] 
		let a = [10, 20, 30];
		let b = [40, 50, 60];

		let c = [];
		a의 값과 b의 값을 교차로 c에 추가하시오.
		규칙은 아래와 같다.
		
		c = [10]     
		c = [10,40]  
		c = [10,40,20]
		c = [10,40,20,50]
		c = [10,40,20,50,30]
		c = [10,40,20,50,30,60]

    */
    /*
		[정답]
		c = [10,40,20,50,30,60]
    */

	let a = [10, 20, 30];
	let b = [40, 50, 60];

	let c = [];

	for(let i = 0; i < a.length; i++){
		c.push(a[i]);
		c.push(b[i]);
	}

	document.write(c);
</script>
