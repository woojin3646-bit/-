}

font-size: 16px
font0-weight: 400; , 700;

🎯 3️⃣ 박스 (div 기본 세팅)
.box {
    width: 300px;
    height: 200px;
    background-color: #eee;
}

👉 div = 박스라고 생각해라

🎯 4️⃣ 버튼 (실무 필수)
.btn {
    background-color: #3b82f6;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

👉 이거 그대로 외워도 됨

🎯 5️⃣ input (로그인 / 검색창)
.input {
    border: 1px solid #ccc;
    border-radius: 5px;
}
🎯 6️⃣ 링크 기본 제거 (무조건)

    text-decoration: none;
    color: black;
}

}

<p>여기 <span class="red">이거만</span></p>

👉 일부만 바꿀 때

🎯 9️⃣ hover (마우스 효과)
.btn:hover {

}
